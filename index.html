@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#070B12;min-height:100vh;max-width:480px;margin:0 auto;color:#E2E8F0;position:relative;overflow-x:hidden;transition:opacity 0.5s ease,transform 0.5s ease;}
.app::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;z-index:0;}

/* REST BAR */
.rest-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1E293B;z-index:200;height:36px;display:flex;align-items:center;padding:0 16px;font-size:12px;font-weight:700;color:#94A3B8;overflow:hidden;}
.rest-prog{position:absolute;left:0;top:0;height:100%;background:rgba(59,130,246,0.2);transition:width 1s linear;}
.rest-skip{margin-left:auto;position:relative;z-index:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 10px;color:#94A3B8;font-size:11px;cursor:pointer;font-family:inherit;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,18,0.93);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(255,255,255,0.05);padding:14px 18px 0;transition:top 0.3s;}
.header-inner{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.eyebrow{font-size:8px;letter-spacing:3px;color:#1E293B;font-weight:800;text-transform:uppercase;margin-bottom:3px;}
.wordmark{font-size:21px;font-weight:900;letter-spacing:-0.3px;line-height:1;}
.wm-light{color:#475569;font-weight:500;}
.wm-bold{font-weight:900;}
.day-badge{border:1px solid;border-radius:12px;padding:6px 13px;text-align:center;}
.tabs{display:flex;gap:4px;padding-bottom:13px;}
.tab-btn{flex:1;padding:7px 2px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;background:rgba(255,255,255,0.04);color:#4B5563;transition:all 0.28s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:3px;flex-direction:column;}
.tab-btn:hover:not(.tab-active){background:rgba(255,255,255,0.07);color:#64748B;}
.tab-active{font-weight:800!important;}
.content{position:relative;z-index:1;padding-bottom:90px;}
.tab-slide{animation:tabSlideIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes tabSlideIn{from{opacity:0;transform:translateX(calc(var(--dir)*22px)) scale(0.98);}to{opacity:1;transform:translateX(0) scale(1);}}

/* DAY SCROLLER */
.day-scroller{display:flex;gap:7px;padding:16px 18px 12px;overflow-x:auto;scrollbar-width:none;}
.day-scroller::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;padding:9px 12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);cursor:pointer;text-align:center;min-width:52px;transition:all 0.26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-chip:hover{background:rgba(255,255,255,0.05);}
.day-chip-sel{font-weight:800;}

/* DAY HERO */
.day-hero{margin:0 18px 14px;padding:15px 17px;border:1px solid;border-radius:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1;}

/* EXERCISE CARDS */
.ex-list{padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.ex-wrap{animation:fadeUp 0.3s cubic-bezier(.4,0,.2,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.ex-card{border:1.5px solid;padding:13px 14px 8px;transition:all 0.26s cubic-bezier(.4,0,.2,1);}
.ex-card:hover{filter:brightness(1.06);}
.ex-card-open{}
.ex-card-done{}
.ex-main-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px;}
.ex-num-wrap{flex-shrink:0;padding-top:1px;}
.ex-num{width:26px;height:26px;border-radius:8px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all 0.3s ease;}
.ex-name{font-size:13.5px;font-weight:800;line-height:1.2;}
.cat-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;border:1px solid;letter-spacing:0.3px;flex-shrink:0;}
.ex-stats-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.ex-stat-chip{font-size:10px;color:#64748B;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 7px;font-weight:600;}
.form-btn{width:100%;padding:7px 12px;border-radius:9px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 0;transition:all 0.2s ease;}
.form-btn:hover{filter:brightness(1.2);}
.set-track{display:flex;gap:4px;margin-top:8px;}
.set-seg{height:3px;flex:1;border-radius:3px;transition:background 0.3s ease,box-shadow 0.3s ease;}

/* SET PANEL */
.set-panel{border:1.5px solid;border-top:none;border-radius:0 0 16px 16px;overflow:hidden;max-height:0;opacity:0;padding:0 13px;transition:max-height 0.4s cubic-bezier(.4,0,.2,1),opacity 0.28s ease,padding 0.3s ease;}
.prev-best{border:1px solid;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.sets-grid{display:flex;flex-direction:column;gap:7px;}
.set-row{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:10px;border:1px solid;transition:all 0.2s ease;}
.set-inp{width:100%;padding:8px 24px 8px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;font-weight:600;text-align:center;outline:none;transition:border-color 0.2s;}
.set-inp:focus{border-color:rgba(255,255,255,0.2);}
.set-inp::placeholder{color:#1E293B;}
.log-btn{padding:8px 10px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s cubic-bezier(.4,0,.2,1);}
.log-btn:active{transform:scale(0.91);}

/* CARD */
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px;margin-bottom:12px;}
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:2.5px;color:#475569;text-transform:uppercase;display:block;}

/* FOOD */
.add-btn{display:block;width:100%;margin-bottom:12px;padding:13px;border-radius:12px;border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.25s cubic-bezier(.4,0,.2,1);}
.add-btn:active{transform:scale(0.98);}
.add-btn-cancel{background:rgba(255,255,255,0.06)!important;color:#4B5563!important;box-shadow:none!important;}
.search-inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.search-inp:focus{border-color:rgba(255,255,255,0.2);}
.search-inp::placeholder{color:#334155;}
.food-list{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto;scrollbar-width:thin;}
.food-item{text-align:left;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;justify-content:space-between;align-items:center;animation:foodPop 0.35s cubic-bezier(0.34,1.4,0.64,1) both;transition:background 0.15s,border-color 0.15s,transform 0.15s;}
.food-item:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.14);transform:translateX(2px);}
.food-item:active{transform:scale(0.98);}
@keyframes foodPop{from{opacity:0;transform:translateY(10px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.food-detail-enter{animation:detailSlideUp 0.38s cubic-bezier(0.34,1.3,0.64,1) both;}
@keyframes detailSlideUp{from{opacity:0;transform:translateY(18px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.macro-card-anim{animation:macroReveal 0.45s cubic-bezier(0.34,1.2,0.64,1) both;}
@keyframes macroReveal{from{opacity:0;transform:scale(0.93) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.back-btn{background:none;border:none;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;padding:0 0 12px;display:block;}
.serving-btn{width:100%;text-align:left;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;transition:all 0.18s;}
.serving-btn:hover{background:rgba(255,255,255,0.07);}
.custom-tog{width:100%;margin-top:10px;padding:9px;border-radius:9px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:#475569;font-size:12px;cursor:pointer;font-family:inherit;}
.custom-form{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.custom-inp{padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;}
.custom-inp::placeholder{color:#2D3748;}
.custom-sub{padding:11px;border-radius:11px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;width:100%;}
.custom-sub:active{transform:scale(0.98);}
.meal-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.rm-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.18);border-radius:6px;padding:3px 8px;color:#EF4444;cursor:pointer;font-size:11px;}
.empty{text-align:center;color:#2D3748;padding:36px 0;font-size:13px;line-height:1.9;}

/* CALENDAR */
.cal-nav{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;color:#94A3B8;cursor:pointer;font-size:14px;font-family:inherit;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{padding:6px 2px;border-radius:9px;border:1.5px solid;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:54px;justify-content:center;transition:all 0.2s ease;}
.cal-day:hover{filter:brightness(1.15);}

/* WEIGHT */
.log-weight-btn{padding:10px 16px;border-radius:10px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s;}

/* NOTES */
.note-input{width:100%;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:90px;line-height:1.6;}
.note-input::placeholder{color:#334155;}
.tag-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#475569;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.note-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-left:3px solid;border-radius:12px;padding:12px 14px;position:relative;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.note-del{position:absolute;top:10px;right:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:6px;padding:3px 7px;color:#EF4444;cursor:pointer;font-size:11px;}

/* GUIDE */
.guide-sec-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748B;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.22s;}
.guide-chip-row{margin-bottom:12px;}
.guide-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid;font-size:11px;font-weight:700;}
.steps-list{display:flex;flex-direction:column;gap:7px;}
.step-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:8px;border-radius:10px;transition:background 0.2s;}
.step-item:hover{background:rgba(255,255,255,0.04);}
.step-active{background:rgba(59,130,246,0.08)!important;}
.step-num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all 0.2s;}
.step-text{font-size:12px;line-height:1.6;padding-top:2px;}
.cue-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 12px;font-size:12px;color:#CBD5E1;line-height:1.5;}
.mistake-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:#94A3B8;line-height:1.5;}
.rest-info{margin-top:14px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);border-radius:9px;padding:9px 12px;font-size:12px;color:#F59E0B;font-weight:700;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#0D1421;border:1px solid rgba(255,255,255,0.1);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1) both;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:17px;font-weight:900;color:#F1F5F9;}
.modal-sub{font-size:11px;color:#475569;margin-top:3px;}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px 32px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 8px 28px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;animation:toastBounce 0.3s cubic-bezier(0.34,1.56,0.64,1) both;white-space:nowrap;}
@keyframes toastBounce{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.88);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3);}}
@keyframes eatPop{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes rainDrop{0%{transform:translateY(0) scale(1);opacity:1;}80%{transform:translateY(40px) scale(0.8);opacity:0.3;}100%{transform:translateY(50px) scale(0.6);opacity:0;}}
@keyframes popPulse{0%{transform:translateY(-50%) scale(1);}50%{transform:translateY(-50%) scale(2.2);opacity:0.7;}100%{transform:translateY(-50%) scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes modalSlideDown{from{transform:translateY(0);}to{transform:translateY(105%);}}
@keyframes overlayFadeOut{from{opacity:1;}to{opacity:0;}}
.modal-exit{animation:modalSlideDown 0.34s cubic-bezier(0.4,0,1,1) both!important;}
.modal-overlay-exit{animation:overlayFadeOut 0.34s ease both!important;}
@keyframes waterBubbleIn{from{opacity:0;transform:translateY(6px) scale(0.7);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes waterDripAway{0%{opacity:1;transform:translateY(0) scaleX(1);}30%{opacity:0.9;transform:translateY(4px) scaleX(0.95);}60%{opacity:0.5;transform:translateY(18px) scaleX(0.8);}100%{opacity:0;transform:translateY(38px) scaleX(0.5);}}
@keyframes panelSlideDown{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(14px) scale(0.97);}}
@keyframes exCollapseOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-6px) scale(0.98);}}
@keyframes checkBounce{0%{transform:scale(0) rotate(-15deg);opacity:0;}50%{transform:scale(1.4) rotate(5deg);}75%{transform:scale(0.9);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes checklistItemIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
@keyframes waterPop{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(0.92);}100%{transform:scale(1);}}
@keyframes toastExit{from{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}to{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.88);}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}
button{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
`,Kp=[{id:"phase1",label:"Phase 1",range:"Weeks 1\u201312",tag:"BUILD THE BASE",color:"#3B82F6",glow:"rgba(59,130,246,0.3)",goal:"5 days/week. Lock in movement patterns. Build the chest base for 245. Develop lat width for V-taper. Every session has a progressive overload target.",science:"Neurological adaptation drives most of your gains in weeks 1\u20138. Your brain is learning to recruit muscle fibers \u2014 this is why beginners get stronger fast even before they visibly grow. Hit every rep with perfect form and your motor patterns will transfer directly to the barbell at school.",days:[{id:"home_mon",label:"MON",tag:"CHEST+PUSH",fullName:"Monday \u2014 Chest & Push",color:"#3B82F6",focus:"Chest (priority) \xB7 Shoulders \xB7 Triceps",warmup:"2 sets of 10 slow push-ups, 10 arm circles each direction, 10 shoulder rotations with a towel",progressNote:"When you hit the TOP of the rep range on ALL sets, add difficulty next session: elevate feet 6 inches, add a pause, or add reps.",exercises:[{name:"DB Floor Press",sets:4,reps:"10\u201312",rest:90,weight:"2\xD712lb",cue:"LIE ON FLOOR. DBs at chest level, elbows at 45 degrees \u2014 NOT flared wide. Press straight up, lock out fully, lower with control until triceps touch floor. This is your bench press substitute. The floor limits range slightly but protects your shoulders. THIS IS YOUR MOST IMPORTANT HOME EXERCISE for hitting 245. Treat it like a main lift. 90s rest minimum between sets."},{name:"Push-Ups",sets:4,reps:"12\u201320",rest:75,weight:"Bodyweight \u2192 Elevated feet",cue:"Hands slightly wider than shoulders, chest touches floor every rep. Squeeze pecs at the top. When you can do 20 clean reps, elevate your feet on a chair \u2014 shifts more load to upper chest and shoulders. Week 1: flat. Week 4+: feet elevated 6 inches. Week 8+: feet elevated on chair seat. Progressive overload without any equipment."},{name:"DB Chest Flyes",sets:3,reps:"15",rest:60,weight:"2\xD710lb or 2\xD712lb",cue:"Floor flyes. Arms out to sides with slight elbow bend. Bring DBs together above your chest in a hugging arc. Feel the STRETCH at the bottom \u2014 that is where pec growth happens. Do NOT rush through the bottom. Light weight, maximum stretch, full squeeze. This is chest isolation at home."},{name:"DB Shoulder Press",sets:3,reps:"10\u201312",rest:75,weight:"2\xD710lb or 2\xD712lb",cue:"Seated on chair. Press straight overhead \u2014 elbows at 45 degrees, not flared forward. 2 seconds down, drive up. Shoulders after chest \u2014 they are already warmed up and chest gets the priority stimulus first."},{name:"DB Lateral Raises",sets:3,reps:"15",rest:60,weight:"2\xD75lb or 2\xD710lb",cue:"Lead with elbows. Stop at shoulder height. 1-second pause at top. Side delts are 60% of what makes your shoulders look wide. These are mandatory every Push day \u2014 no skipping."},{name:"Diamond Push-Ups",sets:3,reps:"10\u201315",rest:60,weight:"Bodyweight",cue:"Hands diamond-shaped under sternum. Elbows track straight back. Hits inner chest and long head of tricep hard. Your triceps are 2/3 of your arm size and critical for your bench press lockout."},{name:"Plank",sets:3,reps:"40s",rest:45,weight:"Bodyweight",cue:"Rigid straight line. Squeeze every muscle. Add 5 seconds per week. Core stiffness is what lets you transfer force from your legs into the bench press \u2014 do not skip this."}]},{id:"home_tue",label:"TUE",tag:"LEGS A",fullName:"Tuesday \u2014 Legs A",color:"#10B981",focus:"Quads \xB7 Hamstrings \xB7 Glutes \xB7 Calves",warmup:"10 leg swings each side, 10 hip circles, 10 slow bodyweight squats going deeper each rep",progressNote:"Add reps each week. When you hit the top of a rep range for 2 sessions in a row, progress to the heavier DB option or add a pause at the bottom.",exercises:[{name:"DB Goblet Squat",sets:4,reps:"12\u201315",rest:75,weight:"1\xD720lb",cue:"DB at chest. Feet shoulder-width, toes slightly out. Hip crease BELOW knee every single rep \u2014 no partial reps. Knees track over pinky toe. This directly trains your squat pattern for school. Weak squats mean weak everything. Do not cheat depth."},{name:"DB Romanian Deadlift",sets:4,reps:"10\u201312",rest:75,weight:"2\xD712lb",cue:"Hip hinge. Push your hips BACK \u2014 do not just bend forward. Feel the hamstring stretch fully at the bottom. Drive hips forward to stand. Hamstrings are half your leg. They protect your knee and drive your squat out of the hole."},{name:"DB Reverse Lunges",sets:3,reps:"10 each leg",rest:60,weight:"2\xD710lb or 2\xD712lb",cue:"Step back, lower rear knee toward floor. Front shin stays vertical, front heel stays down. Push through front heel to return. More knee-friendly than forward lunges. Same quad and glute stimulus. Each leg works alone \u2014 fixes imbalances automatically."},{name:"DB Sumo Squat",sets:3,reps:"15",rest:60,weight:"1\xD720lb",cue:"Wide stance, toes 45 degrees out, DB between legs. Targets inner quads and adductors differently than goblet squat. Full depth \u2014 this is a different stimulus on the same muscles, adding volume without repeating the exact same movement."},{name:"Single-Leg Glute Bridge",sets:3,reps:"15 each",rest:45,weight:"Bodyweight",cue:"Back flat, one foot planted, other leg extended. Drive through heel, squeeze glute at top, hold 1 second. Single-leg eliminates compensation \u2014 your left and right glute both have to work equally. Glute weakness is the #1 cause of knee problems in young lifters."},{name:"Calf Raises",sets:4,reps:"20\u201325",rest:45,weight:"Hold 2\xD712lb or bodyweight on stair edge",cue:"Use a stair edge for full range \u2014 heels drop below toes at the bottom, up on tiptoes at top. 3 seconds down, explosive up. Calves respond to high reps and are trained every leg day for a reason."}]},{id:"home_wed",label:"WED",tag:"LATS+PULL",fullName:"Wednesday \u2014 Back Width & Pull",color:"#8B5CF6",focus:"Lats (V-taper priority) \xB7 Mid-Back \xB7 Biceps \xB7 Rear Delts",warmup:"Dead hang from a doorframe 20 seconds, 10 arm circles, 10 towel face pulls",progressNote:"V-taper is built on Wednesday. Lats = width. Mid-back = thickness. Do both and your waist will look dramatically smaller by comparison. Do NOT skip this day.",exercises:[{name:"Doorframe / Bedsheet Row (Lat Focus)",sets:4,reps:"10\u201315",rest:75,weight:"Bodyweight angle",cue:"CRITICAL FOR V-TAPER. Loop a bedsheet around a door handle, or grip a doorframe. Lean back, arms extended. Pull yourself up driving ELBOWS DOWN AND BACK \u2014 not up. Think pulling your elbows into your back pockets. This is a horizontal pull-up \u2014 the closest thing to lat pulldown you have at home. Get lower and more horizontal each week to increase difficulty. This exercise builds the wide lat flare that creates V-taper."},{name:"DB Single-Arm Row",sets:4,reps:"10\u201312 each",rest:60,weight:"1\xD720lb",cue:"Knee and hand on chair for support. Pull DB from dead hang up to your hip \u2014 ELBOW PAST YOUR HIP at the top. Full stretch at bottom, full contraction at top. 20lb is your heaviest \u2014 use it here. This builds back THICKNESS which pushes your lats out further."},{name:"DB Bent-Over Row",sets:3,reps:"10\u201312",rest:75,weight:"2\xD712lb",cue:"Hinge to 45 degrees, chest proud. Drive elbows straight back. Squeeze shoulder blades at top \u2014 hold 1 second. Both arms simultaneously hits the mid-back symmetrically. Back is the #2 muscle group for V-taper after lats."},{name:"DB Reverse Fly",sets:3,reps:"15",rest:60,weight:"2\xD75lb or 2\xD710lb",cue:"Hinge forward 45 degrees, slight elbow bend, raise arms out to sides. Rear delts \u2014 these make your shoulders look 3D from every angle and correct the forward shoulder posture that ruins otherwise good physiques. Go light, feel every rep."},{name:"DB Bicep Curls",sets:3,reps:"10\u201312",rest:60,weight:"2\xD710lb or 2\xD712lb",cue:"Elbows pinned to sides \u2014 they do not move. Full dead hang at the bottom, hard squeeze at top. Supinate your wrist as you curl. No swinging. Your arms are the finishing detail \u2014 the back and lats are the structure."},{name:"DB Hammer Curls",sets:3,reps:"10\u201312",rest:60,weight:"2\xD710lb or 2\xD712lb",cue:"Neutral grip, thumbs up. Brachialis sits under the bicep \u2014 when it grows it pushes the bicep up and makes your arm look thicker from every angle. These build the arm width that curls alone cannot."},{name:"Superman Hold",sets:3,reps:"10x3s",rest:45,weight:"Bodyweight",cue:"Face down, lift arms chest and legs simultaneously, hold 3 seconds each rep. Lower back and spinal erectors \u2014 this protects your spine under load at school and builds the lower back thickness visible from behind."}]},{id:"home_thu",label:"THU",tag:"LEGS B",fullName:"Thursday \u2014 Legs B",color:"#F59E0B",focus:"Glutes \xB7 Hamstrings \xB7 Core Anti-Rotation",warmup:"20 glute bridges bodyweight, 10 hip circles each side, 10 leg swings, hip flexor stretch 30s each",progressNote:"Legs B focuses on posterior chain \u2014 glutes and hamstrings. These are the muscles that make your legs look powerful from behind and protect your knees.",exercises:[{name:"DB Hip Thrust",sets:4,reps:"15",rest:75,weight:"1\xD720lb on hips",cue:"Upper back on couch edge. DB balanced on hip crease. Drive through HEELS, thrust hips up, SQUEEZE GLUTE at lockout, hold 2 seconds. Full hip extension every rep. Glutes are the largest muscle in your body \u2014 training them hard compounds directly into your squat and deadlift at school."},{name:"DB Stiff-Leg Deadlift",sets:4,reps:"10\u201312",rest:75,weight:"2\xD712lb",cue:"Near-straight legs with soft knees. Hinge deep, feel full hamstring stretch at bottom. Keep DBs close to your legs. Drive hips forward to stand. More range than Romanian DL \u2014 greater hamstring stretch means greater growth stimulus."},{name:"DB Walking Lunges",sets:3,reps:"12 each leg",rest:75,weight:"2\xD710lb or 2\xD712lb",cue:"Step forward, lower back knee, step through with the other leg \u2014 continuous movement. Torso upright. These build quad size and single-leg balance simultaneously. Progress: add pause at bottom each rep by week 6."},{name:"Glute Kickbacks",sets:3,reps:"15 each",rest:45,weight:"Bodyweight",cue:"On hands and knees. Drive one heel straight up toward ceiling, knee bent 90 degrees, squeeze glute HARD at top. Slow and deliberate \u2014 this is isolation work. The pump you feel is the growth signal. Works the upper glute that hip thrusts miss."},{name:"Plank with DB Drag",sets:3,reps:"10 each side",rest:45,weight:"1\xD75lb or 1\xD710lb",cue:"Plank position. Slowly drag a DB from one side to the other under your body. Core resists the rotation each rep. Anti-rotation strength is what keeps your spine safe under heavy squats and directly tightens your midsection visually. More effective than crunches for V-taper aesthetics."},{name:"Side Plank",sets:3,reps:"30s each side",rest:45,weight:"Bodyweight",cue:"Side plank \u2014 body in a straight diagonal line. Oblique and hip abductor under load. Oblique strength and tightness makes your waist look narrower \u2014 critical for V-taper. Do not let hips drop."}]},{id:"home_fri",label:"FRI",tag:"PUSH+ARMS",fullName:"Friday \u2014 Shoulders & Arms",color:"#EF4444",focus:"Shoulders (all 3 heads) \xB7 Triceps \xB7 Biceps",warmup:"Arm circles, 10 light lateral raises, 10 pike push-ups easy, shoulder rotations",progressNote:"Friday is arms and shoulder detail work. Wide shoulders + full arms = V-taper from every angle. Both are trained after a full week of compound lifting.",exercises:[{name:"Pike Push-Ups",sets:4,reps:"10\u201315",rest:75,weight:"Bodyweight \u2014 angle progression",cue:"Inverted V. Lower your head toward the floor between your hands. This mimics an overhead press \u2014 same deltoid recruitment pattern as OHP. Each week walk your feet 2 inches closer to your hands to increase the angle. By week 12 your body should be significantly more vertical. This is your OHP progression."},{name:"DB Arnold Press",sets:4,reps:"10\u201312",rest:75,weight:"2\xD710lb or 2\xD712lb",cue:"Start with palms facing you at chin height. Rotate outward as you press up. Hits anterior, medial, AND posterior deltoid in one movement. Invented by Arnold specifically for complete shoulder development. 2 seconds down each rep."},{name:"DB Lateral Raises",sets:4,reps:"15",rest:60,weight:"2\xD75lb or 2\xD710lb",cue:"Second lateral raise day this week \u2014 intentional. Side delts are the widest point of your body above the waist. Training them twice per week is optimal frequency for hypertrophy. Lead with elbows, 1 second pause at top. Your shoulders will look noticeably wider at 3 months."},{name:"DB Overhead Tricep Extension",sets:3,reps:"12",rest:60,weight:"1\xD720lb",cue:"Both hands on one DB overhead. Lower behind head, elbows pointing forward. Full stretch at bottom \u2014 the long head of the tricep is fully loaded at the stretched position. This builds the lower horseshoe of the tricep that makes your arm look massive from the side."},{name:"DB Skull Crushers",sets:3,reps:"12",rest:60,weight:"2\xD710lb",cue:"Lie on floor. DBs above chest. Bend elbows to lower DBs toward your forehead \u2014 upper arms completely still and vertical. Extend back up. Lateral and medial heads of the tricep. Use both 10s for 20lbs total."},{name:"DB Concentration Curls",sets:3,reps:"10\u201312 each",rest:60,weight:"1\xD712lb or 1\xD720lb",cue:"Seated. Elbow braced on inner thigh \u2014 zero momentum possible. Full range, hard 2-second squeeze at top. Best exercise for bicep peak development. The isolation is what creates the defined peak."},{name:"DB Zottman Curls",sets:3,reps:"10",rest:60,weight:"2\xD710lb",cue:"Curl up supinated (palms up), rotate to pronated at top, lower with palms down \u2014 3 seconds. Trains biceps concentrically and brachioradialis eccentrically. Most complete curl for full arm development. Your arms end every week here \u2014 fully pumped."}]}]},{id:"phase2",label:"Phase 2",range:"Months 3\u20136",tag:"INTENSITY SURGE",color:"#F59E0B",glow:"rgba(245,158,11,0.3)",goal:"Every exercise gets harder. Tempo work, pause reps, intensity techniques. Same weights \u2014 10x harder stimulus. This is where the visible transformation happens.",science:"By month 3 structural hypertrophy is the primary driver. Muscle fibers physically increase in cross-sectional area. Volume goes up, rest comes down, and mechanical tension is maximized through slowed eccentrics and pause reps. Your body needs a new reason to adapt \u2014 this phase gives it one.",days:[{id:"home_mon2",label:"MON",tag:"CHEST+PUSH",fullName:"Monday \u2014 Chest & Push (Advanced)",color:"#F59E0B",focus:"Chest (priority) \xB7 Shoulders \xB7 Triceps",warmup:"15 push-ups, 10 arm circles, 10 shoulder rotations, 10 light lateral raises",progressNote:"Phase 2 overload: 3-second eccentrics on all press movements. Pauses at bottom of flyes. Feet-elevated push-ups. Every session should feel harder than Phase 1 at the same weight.",exercises:[{name:"DB Floor Press (3-sec negative)",sets:5,reps:"10",rest:90,weight:"2\xD712lb",cue:"FIVE SETS NOW \u2014 added volume drives bench progress. 3 seconds down on every single rep. The eccentric is where most muscle damage occurs \u2014 this is what drives hypertrophy. At 3 months your floor press strength directly predicts your bench press strength at school. Do not skip sets."},{name:"Elevated Feet Push-Ups",sets:4,reps:"12\u201315",rest:75,weight:"Feet on chair seat",cue:"Feet elevated shifts emphasis to upper chest and anterior deltoid \u2014 the exact muscles used in incline bench press. Upper chest development is what makes your chest look full and thick from every angle. Hands wider than shoulder-width for maximum pec stretch. Chest touches the floor."},{name:"DB Chest Flyes (2-sec pause at bottom)",sets:3,reps:"12",rest:60,weight:"2\xD712lb",cue:"Maximum stretch at the bottom \u2014 2-second pause there. The pec is under maximum tension in the stretched position. Pausing eliminates the stretch reflex and forces the muscle to restart from a dead stretch. This is significantly harder than standard flyes and produces more growth."},{name:"Pike Push-Ups (steep angle)",sets:4,reps:"10\u201312",rest:75,weight:"Feet on chair seat",cue:"Feet on chair \u2014 body much more vertical. This is close to a wall handstand push-up. Loads the deltoid heavily. Trains the exact movement pattern of overhead press. Progress: eventually walk hands closer to the chair to get fully vertical."},{name:"DB Lateral Raises (pause)",sets:4,reps:"12",rest:60,weight:"2\xD710lb",cue:"2-second pause at shoulder height on every rep. The pause eliminates all momentum \u2014 the side delt has to hold the weight with no stretch reflex help. Much harder than standard raises. Your shoulders will feel this immediately."},{name:"DB Overhead Tricep Extension",sets:4,reps:"12",rest:60,weight:"1\xD720lb",cue:"1-second pause at the bottom with full stretch. Long head of tricep at maximum stretch is where it grows fastest. 4 sets now \u2014 triceps are critical for bench press lockout and for arm size. Your lockout strength is often what limits your bench more than chest strength."},{name:"Hollow Body Hold",sets:3,reps:"30s",rest:45,weight:"Bodyweight",cue:"Lower back pressed into floor, legs and shoulders raised, arms overhead. Gymnastic core exercise \u2014 far harder than a plank. Builds the deep core rigidity that transfers directly to a stable bench press arch and protected spine under load."}]},{id:"home_tue2",label:"TUE",tag:"LEGS A",fullName:"Tuesday \u2014 Legs A (Advanced)",color:"#10B981",focus:"Quads \xB7 Hamstrings \xB7 Explosiveness",warmup:"Hip circles, 10 slow goblet squats bodyweight, 10 glute bridges, leg swings",progressNote:"Phase 2 legs: add pause reps, slow eccentrics, and power work. Same weights feel dramatically harder. Quad and glute development translates directly to barbell squat at school.",exercises:[{name:"DB Bulgarian Split Squat",sets:4,reps:"8\u201310 each",rest:90,weight:"2\xD712lb",cue:"THE KING OF HOME LEG EXERCISES. Rear foot on chair, front foot far forward so shin stays vertical at bottom. Go deep \u2014 hip crease below knee. Each leg works alone. This is harder than any goblet squat and directly builds the quad size that makes legs look impressive. It will be humbling at first \u2014 that is correct."},{name:"DB Goblet Squat (pause)",sets:3,reps:"12",rest:75,weight:"1\xD720lb",cue:"3-second pause at the bottom of every rep. The pause at depth eliminates the stretch reflex \u2014 your quads restart from zero. This is significantly harder than regular goblet squats and builds quad strength in the exact position that matters for barbell squats."},{name:"DB Romanian Deadlift (3-sec negative)",sets:4,reps:"10",rest:75,weight:"2\xD712lb",cue:"3 seconds down, explosive up. The controlled eccentric under full hamstring stretch is one of the most powerful growth stimuli available. You will feel this 24\u201348 hours later. That is the growth signal."},{name:"Jump Squats",sets:3,reps:"8",rest:60,weight:"Bodyweight",cue:"Squat to parallel, explode as high as possible, land softly with bent knees. Fast-twitch fiber recruitment that regular lifting does not target. Do these while fresh. Makes you more explosive in every lift and athletic movement."},{name:"DB Walking Lunges (pause)",sets:3,reps:"10 each leg",rest:75,weight:"2\xD712lb",cue:"1-second pause at the bottom of each lunge. Maximum quad stretch under load \u2014 the pause removes momentum. Continuous steps. Torso upright throughout."},{name:"Single-Leg Calf Raises",sets:4,reps:"15\u201320 each",rest:45,weight:"Hold 1\xD712lb",cue:"One leg only \u2014 double the load of two-leg raises. Step edge for full range. 3 seconds down, explosive up. The only way calves grow is high volume and consistent frequency. Do not skip."}]},{id:"home_wed2",label:"WED",tag:"LATS+PULL",fullName:"Wednesday \u2014 Back Width & Pull (Advanced)",color:"#8B5CF6",focus:"Lats (V-taper) \xB7 Back Thickness \xB7 Biceps",warmup:"Dead hang 30 seconds, 10 arm circles, 10 towel face pulls, 10 Superman holds",progressNote:"This is still your most important day for V-taper. Lats are trained first and hardest. Phase 2 adds renegade rows and chest-supported rear delt work \u2014 more volume, zero momentum.",exercises:[{name:"Doorframe / Bedsheet Row (horizontal pull-up)",sets:4,reps:"12\u201315",rest:75,weight:"Steeper body angle than Phase 1",cue:"Get your body MORE horizontal than Phase 1 \u2014 heels on the floor, body nearly flat. Pull your chest to the door handle driving elbows DOWN not up. This angle more closely mimics a real pull-up. It is significantly harder. If you can do 15 easy, walk your feet further from the door. The lat width built here is what makes your waist look small."},{name:"DB Renegade Row",sets:4,reps:"8 each arm",rest:90,weight:"2\xD712lb",cue:"Push-up position holding DBs. Row one arm while the other stabilizes and your core resists rotation. Row AND plank simultaneously. Anti-rotational core, back, and shoulder stability all in one. One of the most effective total-body exercises in this program. Keep hips completely square \u2014 no rotation."},{name:"DB Single-Arm Row (pause)",sets:4,reps:"10\u201312 each",rest:60,weight:"1\xD720lb",cue:"2-second pause at full contraction \u2014 elbow past your hip. The pause eliminates the bounce-back reflex at the top and forces a true full-range contraction. Use your heaviest DB. This single exercise does more for back thickness than anything else you have access to at home."},{name:"DB Reverse Fly (chest supported)",sets:3,reps:"15",rest:60,weight:"2\xD75lb or 2\xD710lb",cue:"Lie face-down on a slightly elevated surface \u2014 bed edge or angled chair. This removes ALL momentum. Rear delts under complete isolation. 3D shoulder development. These complete the wide shoulder look that V-taper requires."},{name:"Concentration Curls",sets:3,reps:"10\u201312 each",rest:60,weight:"1\xD712lb or 1\xD720lb",cue:"Elbow on inner thigh, 2-second squeeze at top, 2-second negative. Absolute isolation \u2014 zero momentum possible. This builds bicep peak faster than any heavy sloppy curl. The peak is what makes arms look big when flexed."},{name:"DB Zottman Curls",sets:3,reps:"10",rest:60,weight:"2\xD710lb",cue:"Supinate up, pronate down in 3 seconds. Full forearm and bicep development. Thick forearms complete the arm look from every angle."},{name:"Superman Hold",sets:3,reps:"10x3s",rest:45,weight:"Bodyweight",cue:"Full posterior chain \u2014 lower back, glutes, spinal erectors. The lower back is visible from behind and its development completes the muscular back appearance. Also protects your spine for heavy school lifting."}]},{id:"home_thu2",label:"THU",tag:"LEGS B",fullName:"Thursday \u2014 Legs B (Advanced)",color:"#EC4899",focus:"Glutes \xB7 Hamstrings \xB7 Core \xB7 Power",warmup:"20 glute bridges, hip circles, leg swings, 10 bodyweight hip thrusts",progressNote:"Thursday is 4 days after Monday \u2014 full leg recovery. Glutes and hamstrings take center stage. Power work (broad jumps) trains fast-twitch fibers that heavy lifting does not reach.",exercises:[{name:"DB Hip Thrust (3-sec pause)",sets:4,reps:"12",rest:75,weight:"1\xD720lb on hips",cue:"3-second pause at full hip extension with maximum glute squeeze. The glute is strongest and under maximum load at lockout \u2014 holding there triples time under tension. This is the most intense glute stimulus available without a heavy barbell. You will feel this for days. Good."},{name:"DB Stiff-Leg Deadlift (5-sec negative)",sets:4,reps:"8",rest:90,weight:"2\xD712lb",cue:"5 SECONDS DOWN. Feel every inch of the hamstring stretch. Explosive up. The 5-second eccentric under full stretch is one of the most powerful hypertrophy stimuli that exists. Hamstring development here directly increases your RDL and squat numbers at school."},{name:"Broad Jumps",sets:3,reps:"6",rest:90,weight:"Bodyweight",cue:"Squat, swing arms, explode forward as far as possible, land softly in a squat position. Rest fully between reps \u2014 this is POWER not cardio. Fast-twitch fibers that standard lifting never hits. Athletic explosiveness that compounds into every gym lift."},{name:"DB Sumo Romanian Deadlift",sets:3,reps:"12",rest:60,weight:"1\xD720lb or 2\xD712lb",cue:"Wide stance toes out. Hip hinge \u2014 targets inner hamstrings and adductors that standard RDL misses. Different stimulus, same muscles. Volume adds up across both leg days."},{name:"Plank with DB Drag",sets:3,reps:"10 each side",rest:45,weight:"1\xD710lb",cue:"Plank. Drag DB from one side to the other slowly. Core resists rotation. Anti-rotational stability is what makes your midsection look tight and narrow \u2014 more effective for V-taper aesthetics than any crunch. Also directly protects your spine under heavy squats."},{name:"Side Plank (elevated)",sets:3,reps:"30s each side",rest:45,weight:"Bodyweight",cue:"Put your feet on a chair or low surface for an elevated side plank \u2014 more hip abductor and oblique load. Oblique tightness makes your waist look narrower. This is one of the most underrated V-taper exercises. Hold it hard."}]},{id:"home_fri2",label:"FRI",tag:"PUSH+ARMS",fullName:"Friday \u2014 Shoulders & Arms (Advanced)",color:"#EF4444",focus:"Shoulders \xB7 Triceps \xB7 Biceps",warmup:"15 pike push-ups, 10 Arnold press light, 10 lateral raises light, arm circles",progressNote:"Friday ends the week with maximum arm and shoulder pump. By month 6 your shoulder width and arm size will be noticeably different. This day is why.",exercises:[{name:"Pike Push-Ups (feet on chair, max angle)",sets:4,reps:"10\u201312",rest:90,weight:"Bodyweight vertical progression",cue:"Feet elevated on chair seat, body as close to vertical as possible. This is a near-handstand push-up. Maximum deltoid load \u2014 your bodyweight is the resistance. The most advanced pressing movement in this program and the best shoulder builder without equipment. Work toward getting fully vertical over the 3 months of Phase 2."},{name:"DB Arnold Press (3-sec negative)",sets:4,reps:"10",rest:75,weight:"2\xD712lb",cue:"3-second eccentric on every rep. All three delt heads under load the entire descent. By Phase 2 you should feel each head of the deltoid distinctly. That mind-muscle connection amplifies the stimulus. Wide full shoulders are the #1 visual for V-taper."},{name:"DB Lateral Raises (21s method)",sets:3,reps:"21",rest:90,weight:"2\xD75lb or 2\xD710lb",cue:"7 reps bottom to halfway. 7 reps halfway to top. 7 full reps. One set of 21 total. Constant tension through the entire range of motion with no rest. Your side delts will be on fire after one set. This is why your shoulders will look visibly wider at 6 months."},{name:"DB Skull Crushers",sets:4,reps:"12",rest:60,weight:"2\xD710lb",cue:"Floor. DBs above chest. Bend elbows to lower DBs toward ears \u2014 upper arms stay completely vertical. Extend. Lateral and medial head of the tricep. 4 sets \u2014 triceps are 2/3 of arm size and critical for bench lockout. Strong triceps = higher bench press ceiling."},{name:"Close-Grip Push-Ups (weighted backpack)",sets:3,reps:"10\u201315",rest:60,weight:"Backpack with books 10\u201315lbs",cue:"Books in a backpack strapped tight. Hands inside shoulder-width. Elbows tight to torso. Progressive overload through added weight \u2014 same principle as adding plates. When these get easy, add more weight to the backpack. Your triceps will thank you on bench day."},{name:"DB Hammer Curls (cross-body)",sets:3,reps:"10\u201312 each",rest:60,weight:"1\xD712lb or 1\xD720lb",cue:"Cross DB toward opposite shoulder instead of straight up. Different brachialis angle \u2014 builds arm thickness from the front AND side. Alternate arms. Forearm and brachialis thickness makes your arms look bigger even when not flexed."},{name:"DB Zottman Curls",sets:3,reps:"10",rest:60,weight:"2\xD710lb or 2\xD712lb",cue:"Final movement of every week. Supinate up, pronate down in 3 seconds. Complete arm finisher. By the end of this session at month 6 your arms should look and feel completely different from where you started."}]}]}];function x1({showToast:e}){let[t,a]=(0,D.useState)("phase1"),[l,i]=(0,D.useState)(null),[n,s]=(0,D.useState)(null),[r,c]=(0,D.useState)(null),[p,b]=ga("ff_home_logs",{}),[y,h]=(0,D.useState)("workouts"),m=Kp.find(u=>u.id===t),x=Qc();function z(u){n===u?(c(u),setTimeout(()=>{s(null),c(null)},260)):(c(null),s(u))}function q(u,g){let w=`${x}_${u}`;b(C=>({...C,[w]:{...C[w]||{},[g]:!C[w]?.[g]}}))}function f(u){let g=`${x}_${u}`,w=p[g]||{},C=m.days.find(T=>T.id===u);return C?{done:Object.values(w).filter(Boolean).length,total:C.exercises.length}:{done:0,total:0}}let d=m.color;return(0,o.jsxs)("div",{style:{padding:"0 0 100px"},children:[(0,o.jsxs)("div",{style:{background:`linear-gradient(135deg,${d}18 0%,rgba(7,11,18,0) 70%)`,borderBottom:`1px solid ${d}20`,padding:"20px 18px 16px",position:"relative",overflow:"hidden"},children:[(0,o.jsx)("div",{style:{position:"absolute",inset:0,backgroundImage:`linear-gradient(${d}08 1px,transparent 1px),linear-gradient(90deg,${d}08 1px,transparent 1px)`,backgroundSize:"32px 32px",pointerEvents:"none"}}),(0,o.jsxs)("div",{style:{position:"relative"},children:[(0,o.jsx)("div",{style:{fontSize:9,fontWeight:800,letterSpacing:3,color:d,marginBottom:6},children:"HOME ARSENAL \xB7 DUMBBELL PROGRAM"}),(0,o.jsxs)("div",{style:{fontSize:22,fontWeight:900,color:"#F1F5F9",letterSpacing:-.5,lineHeight:1.1,marginBottom:4},children:["BUILT IN THE",(0,o.jsx)("br",{}),(0,o.jsx)("span",{style:{color:d},children:"BEDROOM."})]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#475569",lineHeight:1.6,marginBottom:14},children:"2\xD75 \xB7 2\xD710 \xB7 2\xD712 \xB7 1\xD720lb \xB7 Zero excuses."}),(0,o.jsx)("div",{style:{display:"flex",gap:6,flexWrap:"wrap"},children:["2\xD75lb","2\xD710lb","2\xD712lb","1\xD720lb","Bodyweight"].map(u=>(0,o.jsx)("span",{style:{fontSize:10,f
