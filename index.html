dren:i})]},l))]})]}),e==="timing"&&(0,o.jsxs)("div",{children:[(0,o.jsxs)(M,{title:"Your Ideal Daily Eating Timeline",color:"#F59E0B",children:[(0,o.jsx)("p",{style:{marginBottom:12,fontSize:11,color:"#64748B"},children:"Based on your 5:30am wake + 8:30pm bed + afternoon training schedule. Every window has a specific purpose."}),[{time:"5:30 AM",icon:"\u23F0",label:"Wake Up",color:"#F59E0B",details:"Drink 16oz water immediately. Your body is dehydrated from 9hrs of no water. This alone improves energy and mental clarity within 15 minutes.",foods:"Water first, then prep breakfast"},{time:"5:45\u20136:15 AM",icon:"\u{1F373}",label:"Breakfast \u2014 Meal 1",color:"#EF4444",details:"Most important meal of the day for muscle building. You've been fasting 9hrs. Cortisol is high, muscle breakdown is happening. Protein + carbs stop this immediately.",foods:"4 eggs + 1 cup oatmeal + 1 banana + glass of milk \u2192 ~700 cal, 42g protein"},{time:"9:00\u201310:00 AM",icon:"\u{1F95B}",label:"Mid-Morning Snack \u2014 Meal 2",color:"#10B981",details:"Keep protein synthesis running. Don't let more than 3\u20134 hours pass without protein. Muscles are constantly being broken down and rebuilt \u2014 keep feeding the rebuild side.",foods:"Greek yogurt + handful of granola + berries \u2192 ~280 cal, 18g protein"},{time:"12:00\u20131:00 PM",icon:"\u{1F357}",label:"Lunch \u2014 Meal 3",color:"#3B82F6",details:"Biggest carb meal outside of pre/post workout. Complex carbs here fuel your afternoon and give you sustained energy going into training.",foods:"Chicken breast + rice + broccoli \u2192 ~550 cal, 50g protein"},{time:"3:00\u20133:30 PM",icon:"\u{1F34C}",label:"Pre-Workout \u2014 30\u201345 min before training",color:"#8B5CF6",details:"Fast carbs + small protein. This directly fuels your training. Glycogen (stored carbs in muscle) is the primary fuel for lifting. Going in glycogen-depleted = weaker, fewer reps, worse pump. Don't skip this.",foods:"Banana + 1 tbsp peanut butter OR rice cakes + protein shake \u2192 ~250 cal, 20g protein"},{time:"4:00\u20135:30 PM",icon:"\u{1F3CB}\uFE0F",label:"Training",color:"#EF4444",details:"Lift hard. The food you just ate is actively being used right now. This is why pre-workout nutrition matters \u2014 it's not just energy, it's performance and therefore gains.",foods:"During: water + optional Gatorade if session is 90+ min"},{time:"5:30\u20136:00 PM",icon:"\u26A1",label:"Post-Workout \u2014 within 45 min",color:"#10B981",details:"The anabolic window is real but not as narrow as bro-science says \u2014 it's about 2 hours, not 30 minutes. But sooner is still better. Muscle protein synthesis (MPS) is elevated after training. Hit it with fast protein + carbs to maximize recovery.",foods:"Protein shake + banana + 1 cup chocolate milk \u2192 ~450 cal, 40g protein"},{time:"6:30\u20137:00 PM",icon:"\u{1F37D}\uFE0F",label:"Dinner \u2014 Meal 5",color:"#3B82F6",details:"Largest meal of the day. High protein, complex carbs, vegetables. This feeds overnight muscle repair. Your body does the most repair work during the first 3\u20134 hours of sleep.",foods:"Ground beef + white rice + frozen broccoli OR steak + sweet potato + salad \u2192 ~750 cal, 55g protein"},{time:"6:30\u20138:00 PM",icon:"\u{1F319}",label:"Last Meal \u2014 2 hrs before bed",color:"#8B5CF6",details:"Eat your last significant meal at least 2 hours before sleep. Active digestion raises core body temperature and heart rate \u2014 both of which disrupt deep sleep and kill GH release. If you eat dinner at 7pm, your body is mostly done digesting by 9pm, which gives 30 minutes of wind-down before sleep at 9:30. Perfect.",foods:"If hungry closer to bed: cottage cheese or Greek yogurt only \u2014 slow-digesting, doesn't spike blood sugar"},{time:"8:00 PM",icon:"\u{1F4F5}",label:"Electronics Off",color:"#A855F7",details:"Blue light from screens suppresses melatonin for up to 2 hours. Melatonin is the hormone that initiates the sleep cycle that triggers GH release. No melatonin = no GH surge = 30% fewer gains overnight.",foods:"Casein protein or cottage cheese if still hungry \u2014 these digest in 5\u20137 hours, feeding muscles all night"},{time:"8:30 PM",icon:"\u{1F634}",label:"Lights Out",color:"#6366F1",details:"GH is released in pulses, with the biggest pulse occurring 60\u201390 minutes after you fall asleep. 9 hours gives you 2\u20133 full GH pulses. Missing sleep doesn't just make you tired \u2014 it literally reduces your body's ability to build muscle.",foods:"No food after this. Water is fine."}].map((l,i)=>(0,o.jsxs)("div",{style:{display:"flex",gap:12,marginBottom:14,paddingBottom:14,borderBottom:"1px solid rgba(255,255,255,0.05)",animation:`fadeUp 0.3s cubic-bezier(.4,0,.2,1) ${i*.04}s both`},children:[(0,o.jsxs)("div",{style:{flexShrink:0,textAlign:"center",width:48},children:[(0,o.jsx)("div",{style:{fontSize:18,marginBottom:2},children:l.icon}),(0,o.jsx)("div",{style:{fontSize:8,fontWeight:800,color:l.color,lineHeight:1.3},children:l.time})]}),(0,o.jsxs)("div",{style:{flex:1,minWidth:0},children:[(0,o.jsx)("div",{style:{fontSize:13,fontWeight:900,color:"#F1F5F9",marginBottom:4},children:l.label}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6,marginBottom:5},children:l.details}),(0,o.jsx)("div",{style:{background:`${l.color}10`,border:`1px solid ${l.color}25`,borderRadius:8,padding:"6px 10px",fontSize:11,color:l.color,fontWeight:600,lineHeight:1.5},children:l.foods})]})]},l.time))]}),(0,o.jsxs)(M,{title:"Why 2 Hours Before Bed Matters",color:"#8B5CF6",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"This is one of the most underrated things you can do for gains, energy, and body composition."}),[["Core temperature & sleep quality","Digesting food raises your core body temperature. Deep sleep requires your core temp to drop ~1\u20132\xB0F. If you're actively digesting, your body can't cool down properly, so you stay in light sleep instead of getting deep slow-wave sleep where GH is released."],["Blood sugar & sleep architecture","Eating carbs before bed spikes insulin and blood sugar. The subsequent crash can wake you up at 2\u20133am or cause restless sleep. Eating 2 hrs before bed gives blood sugar time to stabilize."],["GH is inhibited by insulin","Growth hormone and insulin are antagonistic \u2014 when insulin is high (like after eating), GH is suppressed. Your biggest GH pulse happens 60\u201390 min after falling asleep. If insulin is still elevated from a late meal, that pulse is blunted. This directly costs you muscle."],["What to do if you're hungry","Casein protein or cottage cheese are exceptions \u2014 they're slow-digesting (7hr release), don't spike blood sugar, and actually feed muscles during sleep. A small bowl of cottage cheese 30\u201360 min before bed is a legitimate muscle-building strategy used by bodybuilders."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(139,92,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#A78BFA",marginBottom:4},children:["\u{1F4A1} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Pre-Workout Nutrition: The Science",color:"#10B981",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"What you eat 30\u201360 minutes before training directly determines how many reps you get and how much weight you can move."}),[["Fast carbs = immediate fuel","Your muscles run on glycogen (stored glucose). Fast carbs like bananas, white rice, or rice cakes convert to glucose and get stored in muscle within 30\u201345 minutes. This is exactly what gets burned during heavy sets."],["Banana specifically","A medium banana has 27g of carbs \u2014 enough to top off muscle glycogen for a full session. Plus potassium, which prevents muscle cramps. This is why literally every gym athlete eats bananas pre-workout."],["Small protein = starts MPS early","Having 20g protein pre-workout means amino acids are already in your blood when you start training. This extends the muscle protein synthesis window. Think of it as starting the anabolic signal before you even pick up a weight."],["What to avoid","High-fat, high-fiber meals before training slow digestion and can cause cramping. No burgers, full chicken + rice bowls, or anything heavy within 60 minutes of training."],["Caffeine (optional)","100\u2013200mg caffeine 30\u201345 min pre-workout increases strength output by 3\u20138% in most people and delays fatigue. A cup of black coffee works. Not necessary but legitimate if you want it."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(16,185,129,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:4},children:["\u26A1 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Post-Workout: The Anabolic Window",color:"#EF4444",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"After training, muscle protein synthesis (the process of building new muscle) is elevated. Feeding it correctly in this window amplifies gains significantly."}),[["How long is the window?","2 hours post-training, not 30 minutes. The 'you must drink your shake mid-rep' bro-science is a myth. But sooner is still better \u2014 within 45 minutes is ideal, within 2 hours is still effective."],["What your muscles need","Protein (30\u201350g) to fuel MPS + fast carbs (50\u201380g) to replenish glycogen + fluids to replace sweat losses. This combo is why chocolate milk is actually a legitimate post-workout option \u2014 protein, carbs, fluids, electrolytes."],["Best post-workout foods","Protein shake + banana + milk = ideal. Chicken + rice = solid. Greek yogurt + granola + fruit = works. Cottage cheese + rice cakes = underrated."],["What NOT to do","Skip the post-workout meal because you're not hungry. Appetite is often suppressed after intense training \u2014 eat anyway. This is the most important meal for recovery."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(239,68,68,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#EF4444",marginBottom:4},children:["\u{1F525} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"Meal Frequency: How Often to Eat",color:"#3B82F6",children:[["4\u20136 meals per day is optimal","Muscle protein synthesis peaks about 3 hours after a protein meal and then returns to baseline. Eating every 3\u20134 hours keeps MPS elevated throughout the day compared to 2\u20133 large meals."],["Minimum protein per meal: 30\u201340g","Research by Norton & Layman shows you need at least 2.5\u20133g of leucine to trigger a maximum MPS response. This requires ~30\u201340g of protein per meal. Small 10g snacks don't trigger MPS optimally."],["Don't skip meals","Every skipped meal is a missed MPS trigger. At 150g/day across 5 meals = 30g protein each, hitting 5 solid meals beats 3 huge meals every time for muscle building."],["Your 5-meal structure","Breakfast \u2192 Mid-morning snack \u2192 Lunch \u2192 Pre-workout \u2192 Post-workout/Dinner. This spaces protein every 3 hours from 6am to 7pm = 5 MPS triggers per day."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(59,130,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:4},children:["\u{1F4CA} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))})]}),e==="science"&&(0,o.jsxs)("div",{children:[(0,o.jsxs)(M,{title:"How Muscle Actually Grows",color:"#3B82F6",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"Muscle growth (hypertrophy) happens through 3 mechanisms. Your program is designed to hit all three:"}),[["1. Mechanical Tension","The most important driver. Heavy resistance stretches muscle fibers under load, triggering satellite cells to add contractile proteins (actin & myosin). This is why compound lifts with progressive overload matter most."],["2. Metabolic Stress","The 'pump.' Accumulation of lactate and hydrogen ions causes cell swelling and hormonal response (GH, IGF-1). This is why high-rep isolation work at the end of sessions has value."],["3. Muscle Damage","Micro-tears in muscle fibers from eccentric (lowering) phase of lifts triggers repair with slightly bigger fibers. This is why the slow negative matters \u2014 don't just drop the weight."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:4},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.7},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Your Hormonal Superpower at 15",color:"#F59E0B",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"You are in a once-in-a-lifetime hormonal environment right now:"}),[["Testosterone","Peaks during mid-to-late puberty. At 15, your free testosterone is higher than it will be at 30. Every rep you do now builds on this foundation.","#F59E0B"],["Growth Hormone (GH)","Released in large pulses during deep sleep at your age. GH drives protein synthesis, fat burning, and bone growth simultaneously. Sleep 8\u20139 hrs to maximize this.","#8B5CF6"],["IGF-1 (Insulin-like Growth Factor)","Elevated during teen years. Works with GH to amplify muscle protein synthesis. High-protein diet maximizes IGF-1 response.","#10B981"],["Myostatin is lower","Young muscles have reduced myostatin (the protein that limits muscle growth). This is why you can build muscle faster e it."}),[["Signs of high cortisol","Feeling weaker than usual, mood swings, can't sleep despite being tired, persistent belly fat despite dieting."],["Solutions","Don't overtrain. Sleep 8\u20139 hrs. Eat enough calories. Take deload weeks. Breathing exercises (box breathing: 4-4-4-4) lower cortisol acutely."],["Training helps","Consistent moderate-intensity training reduces baseline cortisol levels over time. This is why athletes handle stress better."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#F59E0B",marginBottom:2},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Hydration & Performance Science",color:"#06B6D4",children:[(0,o.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8"},children:"Water is a performance variable, not an afterthought. The data is clear:"}),[["1% dehydrated","Noticeable decline in cognitive function and mood. Focus during workouts suffers."],["2% dehydrated","5\u201310% reduction in strength and endurance. This is why thirst = already behind."],["3%+ dehydrated","Significant impairment. Risk of cramping increases dramatically."],["Strategy","Start every morning with 16oz water. Drink throughout the day. Urine color target: pale yellow, not clear (clear = overhydrated), not dark (dark = behind)."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(6,182,212,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:700,color:"#06B6D4",marginBottom:2},children:["\u{1F4A7} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]})]}),e==="mindset"&&(0,o.jsxs)("div",{children:[(0,o.jsxs)(M,{title:"Motivation Is a Lie. Build a System.",color:"#EF4444",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"Motivation is an emotion. Emotions come and go \u2014 they're not reliable. Every person with a body they're proud of trained on hundreds of days they didn't feel like it. That's not despite their success \u2014 it's the mechanism behind it."}),(0,o.jsx)("p",{style:{marginBottom:0,color:"#F59E0B",fontSize:12,fontStyle:"italic",borderLeft:"3px solid #F59E0B",paddingLeft:10},children:'"We are what we repeatedly do. Excellence, then, is not an act, but a habit." \u2014 Aristotle. Build a system so automatic that motivation is irrelevant.'})]}),(0,o.jsxs)(M,{title:"Identity-Based Habits",color:"#3B82F6",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"The research from James Clear's Atomic Habits: the most powerful motivation shift is moving from goal-based to identity-based thinking."}),[["Weak: 'I want to get bigger'","Goal-based. Once you hit it or fail, the habit disappears."],["Strong: 'I am someone who trains 5 days a week'","Identity-based. Every workout becomes a vote for who you are. Missing feels wrong, not just disappointing."],["The vote system","Every session is one vote for your athletic identity. You don't need a perfect record \u2014 you need a majority. 4/5 training days is still a landslide win."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#3B82F6",marginBottom:2},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]}),(0,o.jsxs)(M,{title:"The 10-Minute Rule",color:"#10B981",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"On the days you'd do anything else \u2014 make only one commitment: show up for 10 minutes. Start warming up. No pressure to finish."}),(0,o.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"The psychological research behind this: starting a task defeats the activation energy barrier. Once started, the brain's natural completion drive takes over. 95% of the time you'll finish the full session."}),(0,o.jsx)("p",{style:{fontSize:11,color:"#10B981",fontWeight:700},children:"And if you don't? You still showed up. That's still a vote. That still counts."})]}),(0,o.jsxs)(M,{title:"Never Miss Twice",color:"#F59E0B",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"One missed session is a slip. Everyone slips. But the data on habit formation is clear: missing twice in a row resets the habit loop back toward the default behavior (not training)."}),["One missed day: recover immediately tomorrow","Two missed days: a choice, not a slip","One week off: the discipline muscle is atrophying","Two weeks: 'I used to work out'","The rule: whatever happened yesterday, you train today."].map((l,i)=>(0,o.jsxs)("div",{className:"cue-item",style:{marginBottom:5,borderLeftColor:"#F59E0B",borderLeft:"2px solid",paddingLeft:8},children:["\u26A1 ",l]},i))]}),(0,o.jsxs)(M,{title:"The Silent Transformation Protocol",color:"#8B5CF6",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"You're not telling anyone. Smart. Here's why this works:"}),[["Announcing goals releases dopamine prematurely","When you tell someone your goal, your brain partially experiences the reward of achieving it \u2014 reducing motivation to actually do the work. Studies by Peter Gollwitzer (NYU) confirm this."],["Social accountability cuts both ways","Public commitment has benefits, but for a teenager the social pressure of visible failure often leads to quitting rather than persisting."],["The reveal is a different kind of fuel","Knowing the reaction is coming \u2014 people who haven't seen you in 6 months, the beach trip, Ryan's face \u2014 this is a specific, tangible, time-bound target. Use it."],["Execute quietly, reveal loudly","Six months from now your body tells the story louder than any Instagram post would have."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#8B5CF6",marginBottom:2},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Hard Days Are Worth 3\xD7 Easy Days",color:"#F59E0B",children:[(0,o.jsx)("p",{style:{marginBottom:8},children:"This isn't motivational fluff \u2014 there's actual physiology behind it. Training under fatigue, low motivation, or after a stressful day creates a stronger adaptation signal:"}),[["Mental fortitude builds resilience","Each rep done despite resistance trains the prefrontal cortex to override limbic avoidance. This transfers to school, work, relationships."],["Training under fatigue improves fatigue resistance","Your body adapts to the specific stress it encounters. Training tired teaches your body to perform under real conditions."],["The compound effect","365 sessions over a year at 100% effort when motivated = good results. 260 sessions including the hard ones others skip = exceptional results. The gap between good and elite is showing up when it's hard."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#F59E0B",marginBottom:2},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]}),(0,o.jsxs)(M,{title:"Comparing to Ryan \u2014 The Right Way",color:"#EF4444",children:[(0,o.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:`Ryan: 5'10", 155 lbs, 135 lb bench, no structured plan. You: 5'11", 142 lbs, 105 lb bench, full program + tracking + nutrition.`}),[["Your untapped advantage","Ryan has more mass right now but no system. You have a system. Systems always beat individual effort over time."],["The beginner gains gap","Ryan hasn't maximized beginner gains either. But whoever trains smarter and more consistently will pull ahead within 3\u20134 months."],["The 6-month projection","Conservative estimate: your bench surpasses Ryan's within 10\u201312 weeks. Total physique surpasses within 4\u20136 months."],["Don't make it about Ryan","The real competitor is who you were last month. Beat that. Ryan is just a benchmark to make the goal concrete."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,o.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#EF4444",marginBottom:2},children:l}),(0,o.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:i})]},l))]})]}),e==="faq"&&(0,o.jsxs)("div",{children:[(0,o.jsx)(M,{title:"Why am I not getting stronger?",color:"#EF4444",children:[["You're not eating enough","This is the #1 reason. Muscle repair and growth require a caloric surplus. If you're eating at or below maintenance, your body doesn't have the raw material to build. Hit 2,900 cal + 150g protein every day \u2014 not just on training days."],["You're not sleeping enough","Strength gains happen during recovery, not during the workout. Consistently sleeping less than 8 hrs cuts GH output by 60\u201370%. One bad sleep week can stall progress."],["Your progressive overload isn't tracked","If you're not writing down weights and reps, you have no way to know if you progressed. Use the Log Sets feature every session. Progress by 5 lbs or 1 rep per week minimum."],["You're skipping rest days","More is not always better. Overtraining \u2014 training the same muscle before it recovers \u2014 causes regression, not growth. Stick to the split."],["You haven't been consistent long enough","Beginners see strength gains in weeks 2\u20134. Visible muscle size takes 8\u201312 weeks of consistent training. If it's been less than 6 weeks, the answer is: keep going."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(239,68,68,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#EF4444",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsx)(M,{title:"Why do I look the same after weeks of training?",color:"#F59E0B",children:[["You can't see your own changes","Your brain adapts to your reflection daily. You literally stop noticing gradual changes. Take monthly progress photos in the same lighting, same angle. Compare month 1 to month 3. You will be shocked."],["Muscle is hidden under fat early on","In the first 1\u20133 months, you're building muscle AND the fat is still there. The visible transformation happens as body fat drops. Stay consistent \u2014 the reveal is coming."],["Clothes and performance tell the truth","Old shirts getting tighter in the shoulders and chest? Bench going up? Back wider? Those are real changes the mirror lies about. Track performance, not just appearance."],["It actually takes 3\u20134 months to look noticeably different","This is honest: visible physique changes take time. Celebrities 'transforming in 8 weeks' for movies are on professional programs, sometimes assisted, and in optimal conditions. Real natural progress at 15 with 3 months of hard work = visibly different body."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(245,158,11,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#F59E0B",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsxs)(M,{title:"Should I lose weight or build muscle first?",color:"#10B981",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"Neither \u2014 you do both at the same time. This is body recomposition and it's your exact plan."}),[["Why you can do both simultaneously","You have three beginner advantages: untrained muscles respond to stimulus even in a deficit, high protein preserves muscle while fat is burned, and elevated teen hormones amplify both processes at once."],["Your target: small surplus","You're eating 2,900 cal \u2014 roughly 200\u2013300 cal above your maintenance. This is enough to build muscle WITHOUT rapid fat gain. You're not bulking (too aggressive) or cutting (loses muscle). You're recomping."],["When recomp stops working","After 6\u201312 months of training, your beginner gains slow and you'll need to choose: dedicated bulk phase (accept some fat gain) or cut phase (accept slower muscle gain). You're not there yet."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(16,185,129,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"Is soreness good? How sore should I be?",color:"#8B5CF6",children:[["DOMS is not required for growth","Delayed Onset Muscle Soreness (24\u201372hr after training) means muscle damage occurred \u2014 not that growth will happen. You can grow muscle with minimal soreness once adapted."],["You WILL get less sore over time","After 4\u20136 weeks, your muscles adapt to the training pattern. Less DOMS does not mean you're not making progress. It means your body is more efficient. This is normal and good."],["What soreness level is okay to train through","Mild-to-moderate DOMS: train through it \u2014 the warm-up will loosen it. Sharp pain, joint pain, or pain that doesn't improve with warmup: rest or see a professional."],["No soreness at all after months of training","Normal. Switch up exercises occasionally (same muscle, different movement), increase weight, or add a set to maintain stimulus."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(139,92,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#8B5CF6",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsx)(M,{title:"What if I miss a day?",color:"#3B82F6",children:[["One missed day: nothing happens","A single missed session has zero impact on your long-term progress. Muscle doesn't disappear in 24 hours. Life happens \u2014 move on."],["Don't try to 'make it up'","Doing two sessions back-to-back or cramming extra volume to compensate leads to overtraining and injury. Just continue the schedule as normal."],["What actually matters is the trend","5 sessions/week \xD7 52 weeks = 260 sessions. Miss 20 sessions (once every 2.5 weeks) = 240 sessions. That's still a phenomenal training year. Consistency over the long run, not perfection."],["Never Miss Twice rule","One miss is a slip. Two consecutive misses is a pattern. The most important session after a missed day is the very next one."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(59,130,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsxs)(M,{title:"Will lifting stunt my growth?",color:"#06B6D4",children:[(0,o.jsx)("p",{style:{marginBottom:8,fontSize:11,fontWeight:700,color:"#06B6D4"},children:"No. This is a myth. Here's the science:"}),[["Where the myth came from","Old studies on child laborers (not athletes) who did excessive manual labor showed stunted growth. This was confused with recreational weight training."],["What the actual research shows","The American Academy of Pediatrics (2008) states resistance training in adolescents is safe and beneficial when performed with proper form and age-appropriate loads. It does NOT damage growth plates."],["What does stunt growth","Poor nutrition, insufficient sleep, and steroid use \u2014 none of which apply to this program. The opposite is true: heavy compound training + good nutrition + 9hrs sleep = maximal height potential reached."],["Growth plates","Growth plate injuries from lifting are extremely rare and almost always from unsafe loads, poor form, or 1-rep max attempts without supervision. Your program uses moderate loads with controlled form. Zero risk."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(6,182,212,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#06B6D4",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"How do I know if I'm eating enough?",color:"#F59E0B",children:[["Scale weight is going up 0.5\u20131 lb/week","At your age, gaining 0.5\u20131 lb/week means you're eating enough to build muscle. Less than that consistently = slightly undereating."],["Energy during workouts is high","If you feel strong through your sessions, your glycogen is being replenished. If you crash mid-workout, you're under-fueled \u2014 specifically carbs."],["You're not constantly hungry","On a proper eating schedule with 5 meals/day, you should feel satisfied most of the time. Constant hunger = undereating."],["Track for 2 weeks straight","Most people underestimate how much they eat by 20\u201330%. Log everything for 14 days. The data tells the truth."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(245,158,11,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#F59E0B",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsxs)(M,{title:"What's a plateau and how do I break one?",color:"#EF4444",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"A plateau is when a lift or body weight stops progressing for 2+ weeks despite consistent training and eating. Here's how to diagnose and fix it:"}),[["First: diagnose the real cause","Is sleep consistent? Eating enough? Actually tracking weights? Most 'plateaus' are just inconsistency masquerading as a physiological limit."],["Deload week","After every 8\u201312 weeks of hard training, take a week at 50\u201360% of normal weights. This allows full CNS and joint recovery. You come back stronger \u2014 not weaker. Professional athletes do this deliberately."],["Add a set","If bench is stuck at 135, add a 4th set before adding weight. More volume is often the trigger for the next strength jump."],["Change rep scheme","Stuck at 3\xD78? Try 5\xD75 with heavier weight for 3 weeks. A different rep range stimulus often breaks neurological stalls."],["Eat more","A true plateau often just means you outgrew your calories. Add 200 cal/day for 2 weeks and see if the lift moves."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(239,68,68,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#EF4444",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"How do I get a bigger chest / bigger arms / bigger shoulders?",color:"#8B5CF6",children:[["Chest: incline bench is the key","Upper chest (clavicular head) is underdeveloped in most beginners. Incline pressing hits it directly. Full range of motion \u2014 stretch at the bottom, full lockout at top. 3\u20134 sets twice/week minimum."],["Arms: they grow from compound work first","Your biceps grow from rows and pull-ups. Your triceps grow from pressing. Direct arm work (curls, extensions) adds detail but compound lifts add mass. If your bench and row go up, your arms go up."],["Shoulders: lateral raises, every week","Side delts make your shoulders look wide. They're a small muscle that responds to higher volume (12\u201320 reps) and consistent frequency. Add 3 sets of lateral raises every session you can fit them in."],["The honest answer: progressive overload","Every muscle grows the same way \u2014 add weight or reps over time. There's no secret exercise. The secret is showing up and adding load consistently."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(139,92,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#8B5CF6",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsx)(M,{title:"Should I do cardio?",color:"#10B981",children:[["For body recomposition: yes, but not much","2\u20133 sessions/week of 20\u201330 min low-intensity cardio (walking, cycling, swimming) supports fat burning without interfering with muscle recovery. Do it on rest days or after lifting."],["Never do heavy cardio before lifting","Cardio before weights pre-fatigues your muscles, reduces strength output, and cuts into your effective training stimulus. If you want to do both on the same day \u2014 lift first, cardio after."],["HIIT vs. steady-state","HIIT (sprints, jump rope intervals) is time-efficient and has an afterburn effect (EPOC). Steady-state (walking, easy bike) is lower stress on recovery. Both work. Prefer HIIT on off days, steady-state anytime."],["Don't overdo it","If you're doing 5 days of lifting + 5 days of intense cardio, recovery becomes impossible and you'll stall on both. Total weekly training stress matters."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(16,185,129,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:4},children:["\u2192 ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))})]}),e==="body"&&(0,o.jsxs)("div",{children:[(0,o.jsxs)(M,{title:"How to Know If Your Form Is Right",color:"#3B82F6",children:[(0,o.jsx)("p",{style:{marginBottom:10,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"Bad form is invisible to you when you're doing it. Here's how to self-check without a coach:"}),[["Record yourself from the side","Set your phone on a water bottle against a wall. Watch the video after every set. You'll immediately see things you feel. Knees caving, back rounding, bar path issues \u2014 all invisible in the moment, obvious on video."],["The 'joint pain vs. muscle fatigue' test","Muscle burning and pump = correct muscles working. Sharp pain in a joint = something is wrong mechanically. Never push through joint pain."],["Use the 'How to Perform' button","Every exercise in the Train tab has a step-by-step guide. Read the coaching cues before your first set of every exercise, especially on a new movement."],["Ego is the enemy of form","More weight with broken form builds injury, not muscle. The muscle doesn't know how much weight is on the bar \u2014 it only knows the tension. 135 lbs with perfect form stimulates more growth than 185 lbs with a rounded back."],["Start lighter than you think you need to","First week of any new exercise: use a weight where the last rep of your set is a 7/10 effort. Not a 10. Learn the pattern first, load it second."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(59,130,246,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:4},children:["\u{1F4F9} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"Bench Press: The Most Common Mistakes",color:"#EF4444",children:[["Flared elbows (90\xB0)","Elbows should be at 45\u201375\xB0 from your torso, not straight out. Flared elbows put extreme stress on the shoulder joint and reduce pec engagement. Think: 'protect your armpits.'"],["Bouncing the bar off your chest","Momentum robs you of the eccentric phase, where most muscle damage (and growth) occurs. Touch-and-go is fine. Bounce-and-press builds nothing."],["No leg drive","Your feet should be flat on the floor, driving into the ground. This stabilizes your entire body and allows you to press 10\u201320% more weight safely."],["Bar path is wrong","The bar shouldn't go straight up. It should travel in a slight arc \u2014 from your lower chest on the way down to slightly above your shoulder at the top. Watch your video to see this."],["Grip too wide or too narrow","For most people: hands slightly wider than shoulder-width. Pinky finger on the ring marks of a standard bar is a reliable starting point."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(239,68,68,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#EF4444",marginBottom:4},children:["\u26A0\uFE0F ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsx)(M,{title:"Squat: The Most Common Mistakes",color:"#10B981",children:[["Knees caving in (valgus collapse)","This is the most dangerous squat error. Causes knee pain and eventually injury. Fix: push your knees OUT over your pinky toe as you descend. Strengthening your glutes directly reduces valgus over time."],["Not squatting deep enough","Parallel (hip crease at knee level) is the minimum for full glute and hamstring development. Above parallel = mostly quad exercise. Most people squat too high because it feels easier \u2014 that's not a reason."],["Heels coming up","Your heels should stay planted throughout the entire movement. Heels up = ankle mobility problem. Fix: elevate heels 1 inch on small plates while you work on ankle mobility stretching daily."],["Caving forward too much","Some forward lean is normal. Excessive lean = weight is too far forward, core is too weak, or bar position is wrong. High-bar squat (bar on traps) stays more upright. Low-bar squat leans forward more \u2014 both are valid but different."],["Breathing and bracing","Breathe in before you descend, hold your breath (Valsalva), squat, stand, then breathe out at the top. Never breathe out at the bottom \u2014 your spine needs that intra-abdominal pressure."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(16,185,129,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:4},children:["\u26A0\uFE0F ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))}),(0,o.jsx)(M,{title:"Reading Your Body: Signals That Matter",color:"#F59E0B",children:[["Pump during training","Blood pooling in the muscle from increased blood flow. Temporary (30\u201360 min after training). Looks great, feels great, but doesn't directly equal growth. Chase progressive overload, not just pump."],["Scale weight fluctuations","Your weight can swing 2\u20135 lbs in a single day from water, food, sodium, and glycogen. Don't weigh yourself daily and panic. Weigh at the same time each week (morning, after bathroom, before eating) and track the weekly trend."],["Looking 'flat' vs. 'full'","Low carbs = flat muscles (depleted glycogen). High carbs = full, pumped muscles. This is water and glycogen \u2014 not fat or muscle. You look biggest the day after a high-carb meal. This is why athletes carb-load before events."],["Strength varies day to day","Your 1-rep max fluctuates by 5\u201310% based on sleep, food, stress, and recovery. Having a bad strength day does not mean you lost gains. Do what you can and log it."],["Sweating more = getting fitter","Higher fitness = better thermoregulation = sweat earlier and more. This is a positive adaptation. It means your cardiovascular system is working more efficiently."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:1 est). Secondary: front delts, triceps. To feel it more in your chest: widen grip slightly, flare elbows less, really think about 'squeezing the bar together' at the top."],["Rows","Primary: lats (back width), rhomboids, rear delts. Secondary: biceps. To feel it more in your back: initiate with your elbow, not your hand. Think 'pull your elbow to your hip.'"],["Squats","Primary: quads. Secondary: glutes, hamstrings, core. To target glutes more: sit back more, wider stance, go deeper. To target quads more: more upright torso, narrower stance."],["Overhead Press","Primary: front and side delts. Secondary: triceps, upper traps. Don't let your lower back arch excessively \u2014 brace your core hard throughout."],["Pull-Ups","Primary: lats. Secondary: biceps, rear delts. Full hang at bottom, chin over bar at top. Partial reps build nothing. Assisted machine or band-assisted if you can't do full pull-ups yet."],["Romanian Deadlift","Primary: hamstrings, glutes. Secondary: lower back. The key is the HIP HINGE \u2014 push your hips backward, not bend forward. Feel the stretch in your hamstrings at the bottom."]].map(([l,i])=>(0,o.jsxs)("div",{style:{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(6,182,212,0.1)"},children:[(0,o.jsxs)("div",{style:{fontSize:12,fontWeight:800,color:"#06B6D4",marginBottom:4},children:["\u{1F4AA} ",l]}),(0,o.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:i})]},l))]}),(0,o.jsx)(M,{title:"The Gym Etiquette No One Tells You",color:"#475569",children:[["Re-rack your weights","Always. Every time. Put the weights back where you found them. This is non-negotiable \u2014 people who don't do this are disliked in every gym."],["Wipe down equipment","Use the paper towels and spray provided. Sweat on equipment is disrespectful."],["Don't curl in the squat rack","The squat rack is for squats, overhead press, and rack pulls. Doing curls in it while someone waits is bad form socially."],["Headphones = don't talk to me","R @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#070B12;min-height:100vh;max-width:480px;margin:0 auto;color:#E2E8F0;position:relative;overflow-x:hidden;transition:opacity 0.5s ease,transform 0.5s ease;}
.app::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;z-index:0;}

/* REST BAR */
.rest-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1E293B;z-index:200;height:36px;display:flex;align-items:center;padding:0 16px;font-size:12px;font-weight:700;color:#94A3B8;overflow:hidden;}
.rest-prog{position:absolute;left:0;top:0;height:100%;background:rgba(59,130,246,0.2);transition:width 1s linear;}
.rest-skip{margin-left:auto;position:relative;z-index:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 10px;color:#94A3B8;font-size:11px;cursor:pointer;font-family:inherit;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,18,0.93);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(255,255,255,0.05);padding:14px 18px 0;transition:top 0.3s;}
.header-inner{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.eyebrow{font-size:8px;letter-spacing:3px;color:#1E293B;font-weight:800;text-transform:uppercase;margin-bottom:3px;}
.wordmark{font-size:21px;font-weight:900;letter-spacing:-0.3px;line-height:1;}
.wm-light{color:#475569;font-weight:500;}
.wm-bold{font-weight:900;}
.day-badge{border:1px solid;border-radius:12px;padding:6px 13px;text-align:center;}
.tabs{display:flex;gap:4px;padding-bottom:13px;}
.tab-btn{flex:1;padding:7px 2px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;background:rgba(255,255,255,0.04);color:#4B5563;transition:all 0.28s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:3px;flex-direction:column;}
.tab-btn:hover:not(.tab-active){background:rgba(255,255,255,0.07);color:#64748B;}
.tab-active{font-weight:800!important;}
.content{position:relative;z-index:1;padding-bottom:90px;}
.tab-slide{animation:tabSlideIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes tabSlideIn{from{opacity:0;transform:translateX(calc(var(--dir)*22px)) scale(0.98);}to{opacity:1;transform:translateX(0) scale(1);}}

/* DAY SCROLLER */
.day-scroller{display:flex;gap:7px;padding:16px 18px 12px;overflow-x:auto;scrollbar-width:none;}
.day-scroller::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;padding:9px 12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);cursor:pointer;text-align:center;min-width:52px;transition:all 0.26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-chip:hover{background:rgba(255,255,255,0.05);}
.day-chip-sel{font-weight:800;}

/* DAY HERO */
.day-hero{margin:0 18px 14px;padding:15px 17px;border:1px solid;border-radius:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1;}

/* EXERCISE CARDS */
.ex-list{padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.ex-wrap{animation:fadeUp 0.3s cubic-bezier(.4,0,.2,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.ex-card{border:1.5px solid;padding:13px 14px 8px;transition:all 0.26s cubic-bezier(.4,0,.2,1);}
.ex-card:hover{filter:brightness(1.06);}
.ex-card-open{}
.ex-card-done{}
.ex-main-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px;}
.ex-num-wrap{flex-shrink:0;padding-top:1px;}
.ex-num{width:26px;height:26px;border-radius:8px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all 0.3s ease;}
.ex-name{font-size:13.5px;font-weight:800;line-height:1.2;}
.cat-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;border:1px solid;letter-spacing:0.3px;flex-shrink:0;}
.ex-stats-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.ex-stat-chip{font-size:10px;color:#64748B;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 7px;font-weight:600;}
.form-btn{width:100%;padding:7px 12px;border-radius:9px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 0;transition:all 0.2s ease;}
.form-btn:hover{filter:brightness(1.2);}
.set-track{display:flex;gap:4px;margin-top:8px;}
.set-seg{height:3px;flex:1;border-radius:3px;transition:background 0.3s ease,box-shadow 0.3s ease;}

/* SET PANEL */
.set-panel{border:1.5px solid;border-top:none;border-radius:0 0 16px 16px;overflow:hidden;max-height:0;opacity:0;padding:0 13px;transition:max-height 0.4s cubic-bezier(.4,0,.2,1),opacity 0.28s ease,padding 0.3s ease;}
.prev-best{border:1px solid;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.sets-grid{display:flex;flex-direction:column;gap:7px;}
.set-row{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:10px;border:1px solid;transition:all 0.2s ease;}
.set-inp{width:100%;padding:8px 24px 8px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;font-weight:600;text-align:center;outline:none;transition:border-color 0.2s;}
.set-inp:focus{border-color:rgba(255,255,255,0.2);}
.set-inp::placeholder{color:#1E293B;}
.log-btn{padding:8px 10px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s cubic-bezier(.4,0,.2,1);}
.log-btn:active{transform:scale(0.91);}

/* CARD */
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px;margin-bottom:12px;}
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:2.5px;color:#475569;text-transform:uppercase;display:block;}

/* FOOD */
.add-btn{display:block;width:100%;margin-bottom:12px;padding:13px;border-radius:12px;border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.25s cubic-bezier(.4,0,.2,1);}
.add-btn:active{transform:scale(0.98);}
.add-btn-cancel{background:rgba(255,255,255,0.06)!important;color:#4B5563!important;box-shadow:none!important;}
.search-inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.search-inp:focus{border-color:rgba(255,255,255,0.2);}
.search-inp::placeholder{color:#334155;}
.food-list{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto;scrollbar-width:thin;}
.food-item{text-align:left;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;justify-content:space-between;align-items:center;animation:foodPop 0.35s cubic-bezier(0.34,1.4,0.64,1) both;transition:background 0.15s,border-color 0.15s,transform 0.15s;}
.food-item:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.14);transform:translateX(2px);}
.food-item:active{transform:scale(0.98);}
@keyframes foodPop{from{opacity:0;transform:translateY(10px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.food-detail-enter{animation:detailSlideUp 0.38s cubic-bezier(0.34,1.3,0.64,1) both;}
@keyframes detailSlideUp{from{opacity:0;transform:translateY(18px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.macro-card-anim{animation:macroReveal 0.45s cubic-bezier(0.34,1.2,0.64,1) both;}
@keyframes macroReveal{from{opacity:0;transform:scale(0.93) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.back-btn{background:none;border:none;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;padding:0 0 12px;display:block;}
.serving-btn{width:100%;text-align:left;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;transition:all 0.18s;}
.serving-btn:hover{background:rgba(255,255,255,0.07);}
.custom-tog{width:100%;margin-top:10px;padding:9px;border-radius:9px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:#475569;font-size:12px;cursor:pointer;font-family:inherit;}
.custom-form{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.custom-inp{padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;}
.custom-inp::placeholder{color:#2D3748;}
.custom-sub{padding:11px;border-radius:11px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;width:100%;}
.custom-sub:active{transform:scale(0.98);}
.meal-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.rm-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.18);border-radius:6px;padding:3px 8px;color:#EF4444;cursor:pointer;font-size:11px;}
.empty{text-align:center;color:#2D3748;padding:36px 0;font-size:13px;line-height:1.9;}

/* CALENDAR */
.cal-nav{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;color:#94A3B8;cursor:pointer;font-size:14px;font-family:inherit;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{padding:6px 2px;border-radius:9px;border:1.5px solid;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:54px;justify-content:center;transition:all 0.2s ease;}
.cal-day:hover{filter:brightness(1.15);}

/* WEIGHT */
.log-weight-btn{padding:10px 16px;border-radius:10px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s;}

/* NOTES */
.note-input{width:100%;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:90px;line-height:1.6;}
.note-input::placeholder{color:#334155;}
.tag-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#475569;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.note-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-left:3px solid;border-radius:12px;padding:12px 14px;position:relative;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.note-del{position:absolute;top:10px;right:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:6px;padding:3px 7px;color:#EF4444;cursor:pointer;font-size:11px;}

/* GUIDE */
.guide-sec-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748B;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.22s;}
.guide-chip-row{margin-bottom:12px;}
.guide-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid;font-size:11px;font-weight:700;}
.steps-list{display:flex;flex-direction:column;gap:7px;}
.step-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:8px;border-radius:10px;transition:background 0.2s;}
.step-item:hover{background:rgba(255,255,255,0.04);}
.step-active{background:rgba(59,130,246,0.08)!important;}
.step-num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all 0.2s;}
.step-text{font-size:12px;line-height:1.6;padding-top:2px;}
.cue-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 12px;font-size:12px;color:#CBD5E1;line-height:1.5;}
.mistake-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:#94A3B8;line-height:1.5;}
.rest-info{margin-top:14px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);border-radius:9px;padding:9px 12px;font-size:12px;color:#F59E0B;font-weight:700;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#0D1421;border:1px solid rgba(255,255,255,0.1);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1) both;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:17px;font-weight:900;color:#F1F5F9;}
.modal-sub{font-size:11px;color:#475569;margin-top:3px;}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px 32px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 8px 28px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;animation:toastBounce 0.3s cubic-bezier(0.34,1.56,0.64,1) both;white-space:nowrap;}
@keyframes toastBounce{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.88);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3);}}
@keyframes eatPop{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes rainDrop{0%{transform:translateY(0) scale(1);opacity:1;}80%{transform:translateY(40px) scale(0.8);opacity:0.3;}100%{transform:translateY(50px) scale(0.6);opacity:0;}}
@keyframes popPulse{0%{transform:translateY(-50%) scale(1);}50%{transform:translateY(-50%) scale(2.2);opacity:0.7;}100%{transform:translateY(-50%) scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes modalSlideDown{from{transform:translateY(0);}to{transform:translateY(105%);}}
@keyframes overlayFadeOut{from{opacity:1;}to{opacity:0;}}
.modal-exit{animation:modalSlideDown 0.34s cubic-bezier(0.4,0,1,1) both!important;}
.modal-overlay-exit{animation:overlayFadeOut 0.34s ease both!important;}
@keyframes waterBubbleIn{from{opacity:0;transform:translateY(6px) scale(0.7);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes waterDripAway{0%{opacity:1;transform:translateY(0) scaleX(1);}30%{opacity:0.9;transform:translateY(4px) scaleX(0.95);}60%{opacity:0.5;transform:translateY(18px) scaleX(0.8);}100%{opacity:0;transform:translateY(38px) scaleX(0.5);}}
@keyframes panelSlideDown{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(14px) scale(0.97);}}
@keyframes exCollapseOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-6px) scale(0.98);}}
@keyframes checkBounce{0%{transform:scale(0) rotate(-15deg);opacity:0;}50%{transform:scale(1.4) rotate(5deg);}75%{transform:scale(0.9);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes checklistItemIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
@keyframes waterPop{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(0.92);}100%{transform:scale(1);}}
@keyframes toastExit{from{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}to{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.88);}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}
button{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
