b work: cable crunches, hanging leg raises, weighted planks. Treat abs like any other muscle \u2014 progressive overload applies."})]})]}),(0,s.jsxs)(Q,{title:"Volume, Frequency & Recovery Science",color:"#475569",children:[(0,s.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#64748B"},children:"Based on meta-analysis of 200+ studies (Krieger, Schoenfeld, Ralston):"}),[["Optimal weekly volume per muscle","10\u201320 hard sets per muscle group per week. Your program hits 14\u201316 sets per major group. Below 10 is insufficient; above 20 increases injury risk without added benefit."],["Training frequency","2\xD7 per week per muscle is optimal for beginners. Your split achieves this for chest, back, and legs."],["Rest between sets","Compound lifts: 2\u20133 min. Isolation: 60\u201390 sec. Shorter rest limits total volume. Longer rest = more strength per set. Both produce growth."],["Failure vs. stopping short","Training to failure isn't required. Stop 1\u20132 reps before failure on most sets. Save true failure sets for the last set of isolation work only."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsxs)("div",{style:{fontSize:12,fontWeight:700,color:"#94A3B8",marginBottom:3},children:["\u{1F4CA} ",l]}),(0,s.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.6},children:n})]},l))]})]}),e==="supps"&&(0,s.jsxs)("div",{children:[(0,s.jsxs)(Q,{title:"Creatine Monohydrate \u2014 The GOAT Supplement",color:"#3B82F6",children:[(0,s.jsx)("p",{style:{marginBottom:10},children:"Most researched sports supplement in history. 700+ peer-reviewed studies. 100% safe. Here's what it actually does:"}),[["Mechanism","Increases phosphocreatine stores in muscle. This replenishes ATP (energy) faster between reps, meaning you can do 1\u20132 more reps per set before fatigue."],["Result","On average: +5\u201310 lbs on major lifts within 3\u20134 weeks. Over a year: 5\u201315% more total volume = significantly more muscle."],["Dosing","3\u20135g per day. Any time. No loading phase needed. With food is fine. Consistent daily use matters \u2014 not timing."],["Cost","$15\u201325 for a 3\u20134 month supply. Plain monohydrate. Don't buy 'Kre-Alkalyn' or 'HCl' \u2014 they're marketing, not better."],["Safety","Safe for teenagers. No documented organ damage at 3\u20135g/day. Discuss with parents \u2014 it's basically salt for your muscles."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:800,color:"#3B82F6",marginBottom:3},children:l}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.6},children:n})]},l))]}),(0,s.jsxs)(Q,{title:"Whey Protein \u2014 Convenience, Not Magic",color:"#10B981",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"Whey is food in powder form. It's not a steroid, not a shortcut \u2014 it's just a convenient way to hit your 150g/day protein target."}),[["When to use","When you're under your protein target and don't want another chicken breast. Post-workout is ideal but any time works."],["How much","1\u20132 scoops per day maximum. Food-first approach. Supplements fill gaps, not replace meals."],["What to look for","Whey Isolate (faster, leaner) or Whey Concentrate (cheaper, slightly more carbs/fat). Both work."],["Best brands for value","Optimum Nutrition Gold Standard, Dymatize ISO100, Bulk supplements plain whey. Avoid proprietary blends."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#10B981",marginBottom:2},children:l}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:n})]},l))]}),(0,s.jsxs)(Q,{title:"Vitamin D3 + K2 \u2014 Most Teens Are Deficient",color:"#8B5CF6",children:[(0,s.jsx)("p",{style:{marginBottom:8}, n:"Over 300 enzymatic reactions in the body require magnesium. Most teens eat a magnesium-poor diet. Deficiency directly impairs sleep quality."}),[["Sleep impact","Magnesium activates the parasympathetic nervous system, reducing cortisol. Better sleep = more GH release = more muscle growth."],["Dosing","200\u2013400mg glycinate form (not oxide \u2014 it's poorly absorbed) 30\u201360 minutes before bed."],["Signs of deficiency","Poor sleep, muscle cramps during or after training, anxiety, fatigue. Sound familiar?"]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#EF4444",marginBottom:2},children:l}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:n})]},l))]}),(0,s.jsx)(Q,{title:"What to NEVER Touch",color:"#334155",children:[["SARMs (Selective Androgen Receptor Modulators)","Marketed as 'safe steroids.' Not FDA approved. Documented cases of liver failure, testosterone suppression, and hormonal disruption in teenagers. Avoid completely."],["Testosterone Boosters","Useless. Your natural testosterone at 15 is already higher than the 'boosted' levels of a 40-year-old man. These do nothing except waste money."],["High-stim pre-workouts","Excessive caffeine at your age affects developing cardiovascular system and can cause anxiety, dependence, and heart arrhythmia. Max 100mg caffeine if anything."],["Anything promising 30 lbs in 30 days","Scam. Maximum natural muscle gain is 1\u20132 lbs per month for a beginner. Anyone promising more is lying."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsxs)("div",{style:{fontSize:12,fontWeight:700,color:"#EF4444",marginBottom:2},children:["\u{1F6AB} ",l]}),(0,s.jsx)("div",{style:{fontSize:11,color:"#64748B",lineHeight:1.5},children:n})]},l))})]}),e==="recovery"&&(0,s.jsxs)("div",{children:[(0,s.jsxs)(Q,{title:"Sleep: Your Most Anabolic Tool",color:"#8B5CF6",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"Growth hormone is secreted in large pulses during slow-wave (deep) sleep. At 15 you produce more GH per night than you ever will again \u2014 but only if you actually sleep 8\u20139 hours."}),[["Stage 3\u20134 sleep (deep sleep)","Primary GH release window. Disrupted or shortened sleep = 60\u201370% reduction in GH pulse. This is why chronic poor sleep kills gains."],["Testosterone release","Morning testosterone peak is 20\u201330% higher after 8 hrs vs 6 hrs of sleep (Leproult & Van Cauter, 2011, JAMA)."],["Muscle repair","Most muscle protein synthesis occurs during sleep. Your body builds what you broke down in the gym during these 8\u20139 hours."],["Practical targets","Same bedtime every night (\xB130 min). No screens 30 min before bed. Cool room (65\u201368\xB0F). Dark. Consistent wake time \u2014 even weekends."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsxs)("div",{style:{fontSize:12,fontWeight:700,color:"#8B5CF6",marginBottom:3},children:["\u{1F4A4} ",l]}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.6},children:n})]},l))]}),(0,s.jsxs)(Q,{title:"Active Recovery Days",color:"#10B981",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"Saturday and Sunday aren't days to sit on the couch. Active recovery accelerates muscle repair without adding fatigue:"}),[["Walking (7,000\u201310,000 steps)","Increases blood flow to muscles, delivers nutrients and removes waste products. Accelerates DOMS recovery."],["Swimming or basketball","Low-impact cardio that maintains cardiovascular fitness without taxing the CNS. Keeps metabolism elevated."],["Stretching & foam rolling","Reduces muscle stiffness, improves range of motion for next session. 10\u201315 min is enough."],["What to avoid","Heavy lifting. High-intensity anything. You need true recovery to show up to Monday strong."]].map(([l,n])=>(0,s.jsxs)("div",{className:"cue-item",style:{marginBottom:6},children:[(0,s.jsx)("div",{style:{fontWeight:700,marginBottom:2},children:l}),(0,s.jsx)("div",{style:{fontSize:10,color:"#64748B"},children:n})]},l))]}),(0,s.jsx)(Q,{title:"Understanding Soreness",color:"#EF4444",children:(0,s.jsxs)("div",{style:{marginBottom:10},children:[(0,s.jsxs)("div",{style:{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:10,padding:"10px 12px",marginBottom:8},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:800,color:"#10B981",marginBottom:4},children:"\u2705 DOMS (Normal Soreness)"}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"Delayed Onset Muscle Soreness. Appears 24\u201348 hrs after training. Dull, achy, affects both sides equally. Feels better once warmed up. This means you worked hard enough. Keep training \u2014 it goes away as you adapt."})]}),(0,s.jsxs)("div",{style:{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"10px 12px"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:800,color:"#EF4444",marginBottom:4},children:"\u26D4 Injury Pain \u2014 Stop Immediately"}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"Sharp, stabbing, or burning pain. One-sided. Gets worse during movement. Doesn't improve with warmup. Joint pain (not muscle). If this happens: stop the exercise, rest, ice, and see a doctor if it persists more than 3\u20135 days."})]})]})}),(0,s.jsxs)(Q,{title:"Stress, Cortisol & Training",color:"#F59E0B",children:[(0,s.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"Cortisol is your stress hormone. Elevated cortisol = muscle breakdown, fat storage, and impaired recovery. School stress, poor sleep, and overtraining all spike it."}),[["Signs of high cortisol","Feeling weaker than usual, mood swings, can't sleep despite being tired, persistent belly fat despite dieting."],["Solutions","Don't overtrain. Sleep 8\u20139 hrs. Eat enough calories. Take deload weeks. Breathing exercises (box breathing: 4-4-4-4) lower cortisol acutely."],["Training helps","Consistent moderate-intensity training reduces baseline cortisol levels over time. This is why athletes handle stress better."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#F59E0B",marginBottom:2},children:l}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:n})]},l))]}),(0,s.jsxs)(Q,{title:"Hydration & Performance Science",color:"#06B6D4",children:[(0,s.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8"},children:"Water is a performance variable, not an afterthought. The data is clear:"}),[["1% dehydrated","Noticeable decline in cognitive function and mood. Focus during workouts suffers."],["2% dehydrated","5\u201310% reduction in strength and endurance. This is why thirst = already behind."],["3%+ dehydrated","Significant impairment. Risk of cramping increases dramatically."],["Strategy","Start every morning with 16oz water. Drink throughout the day. Urine color target: pale yellow, not clear (clear = overhydrated), not dark (dark = behind)."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(6,182,212,0.1)"},children:[(0,s.jsxs)("div",{style:{fontSize:12,fontWeight:700,color:"#06B6D4",marginBottom:2},children:["\u{1F4A7} ",l]}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:n})]},l))]})]}),e==="mindset"&&(0,s.jsxs)("div",{children:[(0,s.jsxs)(Q,{title:"Motivation Is a Lie. Build a System.",color:"#EF4444",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"Motivation is an emotion. Emotions come and go \u2014 they're not reliable. Every person with a body they're proud of trained on hundreds of days they didn't feel like it. That's not despite their success \u2014 it's the mechanism behind it."}),(0,s.jsx)("p",{style:{marginBottom:0,color:"#F59E0B",fontSize:12,fontStyle:"italic",borderLeft:"3px solid #F59E0B",paddingLeft:10},children:'"We are what we repeatedly do. Excellence, then, is not an act, but a habit." \u2014 Aristotle. Build a system so automatic that motivation is irrelevant.'})]}),(0,s.jsxs)(Q,{title:"Identity-Based Habits",color:"#3B82F6",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"The research from James Clear's Atomic Habits: the most powerful motivation shift is moving from goal-based to identity-based thinking."}),[["Weak: 'I want to get bigger'","Goal-based. Once you hit it or fail, the habit disappears."],["Strong: 'I am someone who trains 5 days a week'","Identity-based. Every workout becomes a vote for who you are. Missing feels wrong, not just disappointing."],["The vote system","Every session is one vote for your athletic identity. You don't need a perfect record \u2014 you need a majority. 4/5 training days is still a landslide win."]].map(([l,n])=>(0,s.jsxs)("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.05)"},children:[(0,s.jsx)("div",{style:{fontSize:12,fontWeight:700,color:"#3B82F6",marginBottom:2},children:l}),(0,s.jsx)("div",{style:{fontSize:11,color:"#94A3B8",lineHeight:1.5},children:n})]},l))]}),(0,s.jsxs)(Q,{title:"The 10-Minute Rule",color:"#10B981",children:[(0,s.jsx)("p",{style:{marginBottom:8},children:"On the days you'd do anything else \u2014 make only one commitment: show up for 10 minutes. Start warming up. No pressure to finish."}),(0,s.jsx)("p",{style:{marginBottom:8,fontSize:11,color:"#94A3B8",lineHeight:1.6},children:"The psychological research behind this: starting a task defeats the activation energy barrier. Once started, the brain's natural completion drive takes over. 95% of the time you'll finish th @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#070B12;min-height:100vh;max-width:480px;margin:0 auto;color:#E2E8F0;position:relative;overflow-x:hidden;transition:opacity 0.5s ease,transform 0.5s ease;}
.app::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:26px 26px;pointer-events:none;z-index:0;}

/* REST BAR */
.rest-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1E293B;z-index:200;height:36px;display:flex;align-items:center;padding:0 16px;font-size:12px;font-weight:700;color:#94A3B8;overflow:hidden;}
.rest-prog{position:absolute;left:0;top:0;height:100%;background:rgba(59,130,246,0.2);transition:width 1s linear;}
.rest-skip{margin-left:auto;position:relative;z-index:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 10px;color:#94A3B8;font-size:11px;cursor:pointer;font-family:inherit;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,18,0.93);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(255,255,255,0.05);padding:14px 18px 0;transition:top 0.3s;}
.header-inner{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.eyebrow{font-size:8px;letter-spacing:3px;color:#1E293B;font-weight:800;text-transform:uppercase;margin-bottom:3px;}
.wordmark{font-size:21px;font-weight:900;letter-spacing:-0.3px;line-height:1;}
.wm-light{color:#475569;font-weight:500;}
.wm-bold{font-weight:900;}
.day-badge{border:1px solid;border-radius:12px;padding:6px 13px;text-align:center;}
.tabs{display:flex;gap:4px;padding-bottom:13px;}
.tab-btn{flex:1;padding:7px 2px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;background:rgba(255,255,255,0.04);color:#4B5563;transition:all 0.28s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:3px;flex-direction:column;}
.tab-btn:hover:not(.tab-active){background:rgba(255,255,255,0.07);color:#64748B;}
.tab-active{font-weight:800!important;}
.content{position:relative;z-index:1;padding-bottom:90px;}
.tab-slide{animation:tabSlideIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes tabSlideIn{from{opacity:0;transform:translateX(calc(var(--dir)*22px)) scale(0.98);}to{opacity:1;transform:translateX(0) scale(1);}}

/* DAY SCROLLER */
.day-scroller{display:flex;gap:7px;padding:16px 18px 12px;overflow-x:auto;scrollbar-width:none;}
.day-scroller::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;padding:9px 12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);cursor:pointer;text-align:center;min-width:52px;transition:all 0.26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-chip:hover{background:rgba(255,255,255,0.05);}
.day-chip-sel{font-weight:800;}

/* DAY HERO */
.day-hero{margin:0 18px 14px;padding:15px 17px;border:1px solid;border-radius:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1;}

/* EXERCISE CARDS */
.ex-list{padding:0 18px;display:flex;flex-direction:column;gap:8px;}
.ex-wrap{animation:fadeUp 0.3s cubic-bezier(.4,0,.2,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.ex-card{border:1.5px solid;padding:13px 14px 8px;transition:all 0.26s cubic-bezier(.4,0,.2,1);}
.ex-card:hover{filter:brightness(1.06);}
.ex-card-open{}
.ex-card-done{}
.ex-main-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:8px;}
.ex-num-wrap{flex-shrink:0;padding-top:1px;}
.ex-num{width:26px;height:26px;border-radius:8px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all 0.3s ease;}
.ex-name{font-size:13.5px;font-weight:800;line-height:1.2;}
.cat-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;border:1px solid;letter-spacing:0.3px;flex-shrink:0;}
.ex-stats-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.ex-stat-chip{font-size:10px;color:#64748B;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 7px;font-weight:600;}
.form-btn{width:100%;padding:7px 12px;border-radius:9px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 0;transition:all 0.2s ease;}
.form-btn:hover{filter:brightness(1.2);}
.set-track{display:flex;gap:4px;margin-top:8px;}
.set-seg{height:3px;flex:1;border-radius:3px;transition:background 0.3s ease,box-shadow 0.3s ease;}

/* SET PANEL */
.set-panel{border:1.5px solid;border-top:none;border-radius:0 0 16px 16px;overflow:hidden;max-height:0;opacity:0;padding:0 13px;transition:max-height 0.4s cubic-bezier(.4,0,.2,1),opacity 0.28s ease,padding 0.3s ease;}
.prev-best{border:1px solid;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:600;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.sets-grid{display:flex;flex-direction:column;gap:7px;}
.set-row{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:10px;border:1px solid;transition:all 0.2s ease;}
.set-inp{width:100%;padding:8px 24px 8px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;font-weight:600;text-align:center;outline:none;transition:border-color 0.2s;}
.set-inp:focus{border-color:rgba(255,255,255,0.2);}
.set-inp::placeholder{color:#1E293B;}
.log-btn{padding:8px 10px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s cubic-bezier(.4,0,.2,1);}
.log-btn:active{transform:scale(0.91);}

/* CARD */
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px;margin-bottom:12px;}
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:2.5px;color:#475569;text-transform:uppercase;display:block;}

/* FOOD */
.add-btn{display:block;width:100%;margin-bottom:12px;padding:13px;border-radius:12px;border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.25s cubic-bezier(.4,0,.2,1);}
.add-btn:active{transform:scale(0.98);}
.add-btn-cancel{background:rgba(255,255,255,0.06)!important;color:#4B5563!important;box-shadow:none!important;}
.search-inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.search-inp:focus{border-color:rgba(255,255,255,0.2);}
.search-inp::placeholder{color:#334155;}
.food-list{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto;scrollbar-width:thin;}
.food-item{text-align:left;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;justify-content:space-between;align-items:center;animation:foodPop 0.35s cubic-bezier(0.34,1.4,0.64,1) both;transition:background 0.15s,border-color 0.15s,transform 0.15s;}
.food-item:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.14);transform:translateX(2px);}
.food-item:active{transform:scale(0.98);}
@keyframes foodPop{from{opacity:0;transform:translateY(10px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.food-detail-enter{animation:detailSlideUp 0.38s cubic-bezier(0.34,1.3,0.64,1) both;}
@keyframes detailSlideUp{from{opacity:0;transform:translateY(18px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.macro-card-anim{animation:macroReveal 0.45s cubic-bezier(0.34,1.2,0.64,1) both;}
@keyframes macroReveal{from{opacity:0;transform:scale(0.93) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.back-btn{background:none;border:none;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;padding:0 0 12px;display:block;}
.serving-btn{width:100%;text-align:left;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;transition:all 0.18s;}
.serving-btn:hover{background:rgba(255,255,255,0.07);}
.custom-tog{width:100%;margin-top:10px;padding:9px;border-radius:9px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:#475569;font-size:12px;cursor:pointer;font-family:inherit;}
.custom-form{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.custom-inp{padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;}
.custom-inp::placeholder{color:#2D3748;}
.custom-sub{padding:11px;border-radius:11px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;width:100%;}
.custom-sub:active{transform:scale(0.98);}
.meal-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.rm-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.18);border-radius:6px;padding:3px 8px;color:#EF4444;cursor:pointer;font-size:11px;}
.empty{text-align:center;color:#2D3748;padding:36px 0;font-size:13px;line-height:1.9;}

/* CALENDAR */
.cal-nav{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;color:#94A3B8;cursor:pointer;font-size:14px;font-family:inherit;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{padding:6px 2px;border-radius:9px;border:1.5px solid;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:54px;justify-content:center;transition:all 0.2s ease;}
.cal-day:hover{filter:brightness(1.15);}

/* WEIGHT */
.log-weight-btn{padding:10px 16px;border-radius:10px;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s;}

/* NOTES */
.note-input{width:100%;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#E2E8F0;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:90px;line-height:1.6;}
.note-input::placeholder{color:#334155;}
.tag-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#475569;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.note-item{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-left:3px solid;border-radius:12px;padding:12px 14px;position:relative;animation:fadeUp 0.25s cubic-bezier(.4,0,.2,1) both;}
.note-del{position:absolute;top:10px;right:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:6px;padding:3px 7px;color:#EF4444;cursor:pointer;font-size:11px;}

/* GUIDE */
.guide-sec-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748B;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.22s;}
.guide-chip-row{margin-bottom:12px;}
.guide-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid;font-size:11px;font-weight:700;}
.steps-list{display:flex;flex-direction:column;gap:7px;}
.step-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:8px;border-radius:10px;transition:background 0.2s;}
.step-item:hover{background:rgba(255,255,255,0.04);}
.step-active{background:rgba(59,130,246,0.08)!important;}
.step-num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;transition:all 0.2s;}
.step-text{font-size:12px;line-height:1.6;padding-top:2px;}
.cue-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 12px;font-size:12px;color:#CBD5E1;line-height:1.5;}
.mistake-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:#94A3B8;line-height:1.5;}
.rest-info{margin-top:14px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);border-radius:9px;padding:9px 12px;font-size:12px;color:#F59E0B;font-weight:700;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#0D1421;border:1px solid rgba(255,255,255,0.1);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1) both;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:17px;font-weight:900;color:#F1F5F9;}
.modal-sub{font-size:11px;color:#475569;margin-top:3px;}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;color:#64748B;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px 32px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 8px 28px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;animation:toastBounce 0.3s cubic-bezier(0.34,1.56,0.64,1) both;white-space:nowrap;}
@keyframes toastBounce{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.88);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3);}}
@keyframes eatPop{0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes rainDrop{0%{transform:translateY(0) scale(1);opacity:1;}80%{transform:translateY(40px) scale(0.8);opacity:0.3;}100%{transform:translateY(50px) scale(0.6);opacity:0;}}
@keyframes popPulse{0%{transform:translateY(-50%) scale(1);}50%{transform:translateY(-50%) scale(2.2);opacity:0.7;}100%{transform:translateY(-50%) scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px;}
button{-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
